<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrier</title>
  <link rel="stylesheet" href="global.css" />
<link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<style>
  .page-row {
    align-items: center;
    margin-bottom: 26px;
  }

  .page-frame > section.card {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-radius: 22px;
    border: 1px solid #dbe4ee;
    box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    margin-bottom: 24px;
    padding: 28px;
  }

  .page-frame > section.card .card-pad {
    padding: 0;
    margin-bottom: 18px;
  }

  .page-frame > section.card .card-title-row {
    margin-bottom: 0;
  }

  .page-frame > section.card .card-title-row .icon {
    display: none;
  }

  .page-frame > section.card .card-title {
    width: 100%;
    display: block;
    background: linear-gradient(135deg, #156082 0%, #0f4a63 100%);
    color: #ffffff;
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 10px 22px rgba(21, 96, 130, 0.16);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 18px;
    font-weight: 900;
    text-align: left;
    box-sizing: border-box;
  }

  .table-wrap {
    width: 100%;
    padding: 0 !important;
    margin: 0;
    overflow-x: auto;
    overflow-y: hidden;
    box-sizing: border-box;
    border-radius: 14px;
  }

  .table {
    width: 100% !important;
    min-width: 100% !important;
    border-collapse: separate !important;
    border-spacing: 0 !important;
    background: #ffffff;
    font-size: 13px;
    overflow: hidden;
    border-radius: 14px;
    table-layout: fixed !important;
    border: 1px solid #dbe4ee;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
  }

  .table thead tr {
    background: #eef2f5 !important;
  }

  .table th {
    background: #eef2f5 !important;
    color: #475569 !important;
    padding: 12px 14px !important;
    text-align: left !important;
    font-size: 10px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    white-space: nowrap !important;
  }

  .table td {
    padding: 11px 14px !important;
    border: 0 !important;
    border-bottom: 1px solid #e5e7eb !important;
    color: #0f172a !important;
    font-size: 13px !important;
    font-weight: 300 !important;
    background: #ffffff;
    vertical-align: middle;
    white-space: normal;
    line-height: 1.3;
  }

  .table tbody tr:nth-child(even) td {
    background: #f8fafc !important;
  }

  .table tbody tr:hover td {
    background: #f1f5f9 !important;
  }

  .editable-cell {
    outline: none;
    border-radius: 7px;
    padding: 7px 8px;
    min-height: 32px;
  }

  .editable-cell:hover {
    background: #f8fafc;
  }

  .editable-cell:focus {
    background: #ffffff;
    box-shadow: 0 0 0 2px rgba(21, 96, 130, 0.16);
  }

  .table th:nth-child(1), .table td:nth-child(1) { width: 13%; }
  .table th:nth-child(2), .table td:nth-child(2) { width: 18%; }
  .table th:nth-child(3), .table td:nth-child(3) { width: 15%; }
  .table th:nth-child(4), .table td:nth-child(4) { width: 14%; }
  .table th:nth-child(5), .table td:nth-child(5) { width: 17%; }
  .table th:nth-child(6), .table td:nth-child(6) { width: 17%; }
  .table th:nth-child(7), .table td:nth-child(7) { width: 15%; }
  .table th:nth-child(8), .table td:nth-child(8) { width: 95px; }

  @media(max-width: 900px) {
    .page-row {
      align-items: flex-start;
      flex-direction: column;
    }

    .page-actions,
    .page-actions .btn {
      width: 100%;
    }

    .page-frame > section.card {
      padding: 20px;
    }

    .page-frame > section.card .card-title {
      font-size: 16px;
      padding: 13px 16px;
    }

    .table {
      min-width: 1100px !important;
      table-layout: auto !important;
    }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom:0;">
          <h1>Carrier</h1>
          <p>Manage carrier contacts and lookup references.</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="addCarrierRow()">+ Add Line</button>
          <button class="btn btn-secondary" onclick="loadCarriers()">Refresh</button>
        </div>
      </div>

      <section class="card">
        <div class="card-pad" style="padding-bottom:12px;">
          <div class="card-title-row">

            <div class="card-title">Carrier Table</div>
          </div>
          <div id="carrier-status" class="inline-status"></div>
        </div>

        <div class="table-wrap">
          <table class="table" style="min-width:1500px;">
            <thead>
              <tr>
                <th>Reference</th>
                <th>Carrier</th>
                <th>Person</th>
                <th>Phone</th>
                <th>Email 1 fixed</th>
                <th>Email 2 fixed</th>
                <th>Last Updated By</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="carrier-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const carrierColumns = [
  { field: "reference", label: "Reference" },
  { field: "carrier", label: "Carrier" },
  { field: "person", label: "Person" },
  { field: "phone", label: "Phone" },
  { field: "email_1_fixed", label: "Email 1 fixed" },
  { field: "email_2_fixed", label: "Email 2 fixed" }
];

document.addEventListener("DOMContentLoaded", async function () {
  await requireLogin();
  loadSidebar("carrier");
  loadCarriers();
});

function setCarrierStatus(message, type = "info") {
  const status = document.getElementById("carrier-status");
  status.className = "inline-status show " + type;
  status.textContent = message;

  clearTimeout(status._timer);
  status._timer = setTimeout(() => {
    status.className = "inline-status";
    status.textContent = "";
  }, 2200);
}

async function loadCarriers() {
  const { data, error } = await supabaseClient
    .from("carriers")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    setCarrierStatus("Could not load Carrier records.", "error");
    return;
  }

  const tbody = document.getElementById("carrier-body");
  tbody.innerHTML = "";

  (data || []).forEach(row => {
    const tr = document.createElement("tr");

    carrierColumns.forEach(col => {
      const td = document.createElement("td");
      const div = document.createElement("div");

      div.className = "editable-cell";
      div.contentEditable = "true";
      div.textContent = row[col.field] ?? "";

      div.addEventListener("blur", async function () {
        await updateCarrierCell(row.id, col.field, div.textContent.trim());
      });

      div.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          div.blur();
        }
      });

      td.appendChild(div);
      tr.appendChild(td);
    });

    const userTd = document.createElement("td");
    userTd.textContent = row.updated_by_name || row.created_by_name || "";
    tr.appendChild(userTd);

    const actionTd = document.createElement("td");
    actionTd.innerHTML = `
      <button class="btn btn-danger btn-sm" onclick="deleteCarrierRow('${row.id}')">
        Delete
      </button>
    `;
    tr.appendChild(actionTd);

    tbody.appendChild(tr);
  });
}

async function addCarrierRow() {
  const auditUser = await getAuditUser();

  const { error } = await supabaseClient
    .from("carriers")
    .insert([{
      reference: "",
      carrier: "",
      person: "",
      phone: "",
      email_1_fixed: "",
      email_2_fixed: "",
      created_by_name: auditUser.name,
      created_by_email: auditUser.email,
      updated_by_name: auditUser.name,
      updated_by_email: auditUser.email
    }]);

  if (error) {
    console.error(error);
    setCarrierStatus("Could not add line.", "error");
    return;
  }

  await loadCarriers();
  setCarrierStatus("New line added.", "success");
}

async function updateCarrierCell(id, field, value) {
  const auditUser = await getAuditUser();

  const payload = {};
  payload[field] = value || null;
  payload.updated_by_name = auditUser.name;
  payload.updated_by_email = auditUser.email;

  const { error } = await supabaseClient
    .from("carriers")
    .update(payload)
    .eq("id", id);

  if (error) {
    console.error(error);
    setCarrierStatus("Update failed.", "error");
    return;
  }

  setCarrierStatus("Carrier updated.", "success");
}

async function deleteCarrierRow(id) {
  const { error } = await supabaseClient
    .from("carriers")
    .delete()
    .eq("id", id);

  if (error) {
    console.error(error);
    setCarrierStatus("Delete failed.", "error");
    return;
  }

  await loadCarriers();
  setCarrierStatus("Row deleted.", "success");
}
</script>
</body>
</html>
