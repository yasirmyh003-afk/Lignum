<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrier</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪵</text></svg>">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom:0;">
          <h1>Carrier</h1>
          <p>Manage carrier contacts and lookup references.</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="addCarrierRow()">+ Add Line</button>
          <button class="btn btn-secondary" onclick="loadCarriers()">Refresh</button>
        </div>
      </div>

      <section class="card">
        <div class="card-pad" style="padding-bottom:12px;">
          <div class="card-title-row">
            <div class="icon">🚛</div>
            <div class="card-title">Carrier Table</div>
          </div>
          <div id="carrier-status" class="inline-status"></div>
        </div>

        <div class="table-wrap">
          <table class="table" style="min-width:1500px;">
            <thead>
              <tr>
                <th>Reference</th>
                <th>Carrier</th>
                <th>Person</th>
                <th>Phone</th>
                <th>Email 1 fixed</th>
                <th>Email 2 fixed</th>
                <th>Last Updated By</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="carrier-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const carrierColumns = [
  { field: "reference", label: "Reference" },
  { field: "carrier", label: "Carrier" },
  { field: "person", label: "Person" },
  { field: "phone", label: "Phone" },
  { field: "email_1_fixed", label: "Email 1 fixed" },
  { field: "email_2_fixed", label: "Email 2 fixed" }
];

document.addEventListener("DOMContentLoaded", async function () {
  await requireLogin();
  loadSidebar("carrier");
  loadCarriers();
});

function setCarrierStatus(message, type = "info") {
  const status = document.getElementById("carrier-status");
  status.className = "inline-status show " + type;
  status.textContent = message;

  clearTimeout(status._timer);
  status._timer = setTimeout(() => {
    status.className = "inline-status";
    status.textContent = "";
  }, 2200);
}

async function loadCarriers() {
  const { data, error } = await supabaseClient
    .from("carriers")
    .select("*")
    .order("created_at", { ascending: true });

  if (error) {
    console.error(error);
    setCarrierStatus("Could not load Carrier records.", "error");
    return;
  }

  const tbody = document.getElementById("carrier-body");
  tbody.innerHTML = "";

  (data || []).forEach(row => {
    const tr = document.createElement("tr");

    carrierColumns.forEach(col => {
      const td = document.createElement("td");
      const div = document.createElement("div");

      div.className = "editable-cell";
      div.contentEditable = "true";
      div.textContent = row[col.field] ?? "";

      div.addEventListener("blur", async function () {
        await updateCarrierCell(row.id, col.field, div.textContent.trim());
      });

      div.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          div.blur();
        }
      });

      td.appendChild(div);
      tr.appendChild(td);
    });

    const userTd = document.createElement("td");
    userTd.textContent = row.updated_by_name || row.created_by_name || "";
    tr.appendChild(userTd);

    const actionTd = document.createElement("td");
    actionTd.innerHTML = `
      <button class="btn btn-danger btn-sm" onclick="deleteCarrierRow('${row.id}')">
        Delete
      </button>
    `;
    tr.appendChild(actionTd);

    tbody.appendChild(tr);
  });
}

async function addCarrierRow() {
  const auditUser = await getAuditUser();

  const { error } = await supabaseClient
    .from("carriers")
    .insert([{
      reference: "",
      carrier: "",
      person: "",
      phone: "",
      email_1_fixed: "",
      email_2_fixed: "",
      created_by_name: auditUser.name,
      created_by_email: auditUser.email,
      updated_by_name: auditUser.name,
      updated_by_email: auditUser.email
    }]);

  if (error) {
    console.error(error);
    setCarrierStatus("Could not add line.", "error");
    return;
  }

  await loadCarriers();
  setCarrierStatus("New line added.", "success");
}

async function updateCarrierCell(id, field, value) {
  const auditUser = await getAuditUser();

  const payload = {};
  payload[field] = value || null;
  payload.updated_by_name = auditUser.name;
  payload.updated_by_email = auditUser.email;

  const { error } = await supabaseClient
    .from("carriers")
    .update(payload)
    .eq("id", id);

  if (error) {
    console.error(error);
    setCarrierStatus("Update failed.", "error");
    return;
  }

  setCarrierStatus("Carrier updated.", "success");
}

async function deleteCarrierRow(id) {
  const { error } = await supabaseClient
    .from("carriers")
    .delete()
    .eq("id", id);

  if (error) {
    console.error(error);
    setCarrierStatus("Delete failed.", "error");
    return;
  }

  await loadCarriers();
  setCarrierStatus("Row deleted.", "success");
}
</script>
</body>
</html>
