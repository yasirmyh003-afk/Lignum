<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truck Release Logs</title>
  <link rel="stylesheet" href="global.css" />
      <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">

<style>
  .page-row {
    align-items: center;
    margin-bottom: 26px;
  }

  .page-frame > section.card {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-radius: 22px;
    border: 1px solid #dbe4ee;
    box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .page-frame > section.card .card-pad {
    padding: 24px 28px 16px;
  }

  .page-frame > section.card .card-title-row {
    margin-bottom: 0;
  }

  .page-frame > section.card .card-title-row .icon {
    display: none;
  }

  .page-frame > section.card .card-title {
    width: 100%;
    display: block;
    background: linear-gradient(135deg, #156082 0%, #0f4a63 100%);
    color: #ffffff;
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 10px 22px rgba(21, 96, 130, 0.16);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 18px;
    font-weight: 900;
    text-align: left;
    box-sizing: border-box;
  }

.table-wrap {
  width: calc(100% - 56px);
  max-width: calc(100% - 56px);
  margin: 0 auto 28px;
  padding: 0 !important;
  overflow-x: auto;
  overflow-y: hidden;
  box-sizing: border-box;
  border-radius: 14px;
}

.table {
  width: max-content !important;
  min-width: 100% !important;
  border-collapse: separate !important;
  border-spacing: 0 !important;
  background: #ffffff;
  font-size: 13px;
  overflow: hidden;
  border-radius: 14px;
  table-layout: auto !important;
  border: 1px solid #dbe4ee;
  box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
}

  .table thead tr {
    background: #eef2f5 !important;
  }

  .table th {
    background: #eef2f5 !important;
    color: #475569 !important;
    padding: 12px 14px !important;
    text-align: left !important;
    font-size: 10px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    white-space: nowrap !important;
  }

  .table td {
    padding: 11px 14px !important;
    border: 0 !important;
    border-bottom: 1px solid #e5e7eb !important;
    color: #0f172a !important;
    font-size: 13px !important;
    font-weight: 300 !important;
    background: #ffffff;
    vertical-align: middle;
    white-space: normal;
    line-height: 1.3;
  }

  .table tbody tr:nth-child(even) td {
    background: #f8fafc !important;
  }

  .table tbody tr:hover td {
    background: #f1f5f9 !important;
  }

  .table a {
    color: #156082 !important;
    font-weight: 900;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* Column sizing */
  .table th:nth-child(1), .table td:nth-child(1) { min-width: 80px; }
  .table th:nth-child(2), .table td:nth-child(2) { min-width: 105px; }
  .table th:nth-child(3), .table td:nth-child(3) { min-width: 80px; }
  .table th:nth-child(4), .table td:nth-child(4) { min-width: 95px; }
  .table th:nth-child(5), .table td:nth-child(5) { min-width: 80px; }
  .table th:nth-child(6), .table td:nth-child(6) { min-width: 110px; }
  .table th:nth-child(7), .table td:nth-child(7) { min-width: 130px; }
  .table th:nth-child(8), .table td:nth-child(8) { min-width: 90px; }
  .table th:nth-child(9), .table td:nth-child(9) { min-width: 190px; }
  .table th:nth-child(10), .table td:nth-child(10) { min-width: 90px; }
  .table th:nth-child(11), .table td:nth-child(11) { min-width: 80px; }
  .table th:nth-child(12), .table td:nth-child(12) { min-width: 90px; }
  .table th:nth-child(13), .table td:nth-child(13) { min-width: 90px; }
  .table th:nth-child(14), .table td:nth-child(14) { min-width: 120px; }
  .table th:nth-child(15), .table td:nth-child(15) { min-width: 110px; }
  .table th:nth-child(16), .table td:nth-child(16) { min-width: 90px; }
  .table th:nth-child(17), .table td:nth-child(17) { min-width: 80px; }
  .table th:nth-child(18), .table td:nth-child(18) { min-width: 80px; }
  .table th:nth-child(19), .table td:nth-child(19) { min-width: 90px; }

  @media(max-width: 900px) {
    .page-row {
      align-items: flex-start;
      flex-direction: column;
    }

    .page-actions,
    .page-actions .btn {
      width: 100%;
    }

    .page-frame > section.card .card-pad {
      padding: 20px 20px 14px;
    }

    .table-wrap {
      padding: 0 20px 20px;
    }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom:0;">
          <h1>Truck Release Logs</h1>
          <p>View saved truck release rows and header details.</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="loadTruckReleaseLogs()">Refresh</button>
        </div>
      </div>

      <section class="card">
        <div class="card-pad">
          <div class="card-title-row">
            <div class="icon">🚚</div>
            <div class="card-title">Truck Release Logs</div>
          </div>
        </div>

        <div class="table-wrap">
          <table class="table" style="min-width:2300px;">
            <thead>
              <tr>
                <th>PDF URL</th>
                <th>Timestamp</th>
                <th>SO#</th>
                <th>Cust PO#</th>
                <th>Status</th>
                <th>Customer</th>
                <th>Carrier</th>
                <th>Location</th>
                <th>Add’l Email</th>
                <th>Rate</th>
                <th>Ship Due</th>
                <th>MBF</th>
                <th>IB#</th>
                <th>CAR#</th>
                <th>MILL</th>
                <th>SPECIES</th>
                <th>GRADE</th>
                <th>SIZE</th>
                <th>LENGTH</th>
                <th>PACK SIZE</th>
				<th>Action By</th>
              </tr>
            </thead>
            <tbody id="truck-release-logs-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  loadSidebar("truck-release-logs");
  loadTruckReleaseLogs();
});

async function loadTruckReleaseLogs() {
  const { data: rowLogs, error: rowError } = await supabaseClient
    .from("truck_release_logs")
    .select("*")
    .order("created_at", { ascending: false });

  if (rowError) {
    console.error(rowError);
    return;
  }

  const { data: pdfLogs, error: pdfError } = await supabaseClient
    .from("truck_release_pdf_logs")
    .select("*")
    .order("created_at", { ascending: false });

  if (pdfError) {
    console.error(pdfError);
  }

  const pdfMap = {};
  (pdfLogs || []).forEach(pdf => {
    const key = `${pdf.so_number || ""}__${pdf.cust_po_number || ""}`;
    if (!pdfMap[key]) {
      pdfMap[key] = pdf.pdf_url || "";
    }
  });

  const tbody = document.getElementById("truck-release-logs-body");
  tbody.innerHTML = "";

  rowLogs.forEach(row => {
    const key = `${row.so_number || ""}__${row.cust_po_number || ""}`;
    const pdfUrl = pdfMap[key] || "";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${pdfUrl ? `<a href="${pdfUrl}" target="_blank">Open PDF</a>` : ""}</td>
      <td>${new Date(row.created_at).toLocaleString()}</td>
      <td>${row.so_number || ""}</td>
      <td>${row.cust_po_number || ""}</td>
      <td>${row.status || ""}</td>
      <td>${row.customer || ""}</td>
      <td>${row.carrier_reference || ""}</td>
      <td>${row.location || ""}</td>
      <td>${row.additional_email || ""}</td>
      <td>${row.rate || ""}</td>
      <td>${row.ship_due || ""}</td>
      <td>${row.mbf || ""}</td>
      <td>${row.ib_number || ""}</td>
      <td>${row.car_number || ""}</td>
      <td>${row.mill || ""}</td>
      <td>${row.specie || ""}</td>
      <td>${row.grade || ""}</td>
      <td>${row.size || ""}</td>
      <td>${row.length_value || ""}</td>
      <td>${row.pack_size || ""}</td>
	  <td>${row.created_by_name || row.created_by_email || ""}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
