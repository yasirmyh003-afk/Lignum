<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Purchases Logs</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪵</text></svg>">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom: 0;">
          <h1>New Purchases Logs</h1>
          <p>View all submitted New Purchase Orders exactly as logged at confirmation time.</p>
        </div>

        <div class="page-actions">
          <button class="btn btn-secondary" onclick="loadNewPurchaseLogs()">Refresh</button>
        </div>
      </div>

      <section class="card">
        <div class="card-pad" style="padding-bottom: 12px;">
          <div class="card-title-row">
            <div class="icon">🕘</div>
            <div class="card-title">New Purchase Logs Table</div>
          </div>
          <div id="logs-status" class="inline-status"></div>
        </div>

        <div class="table-wrap">
          <table class="table" style="min-width: 2550px;">
            <thead>
              <tr>
                <th>TIMESTAMP</th>
                <th>LOCATION</th>
                <th>MILL</th>
                <th>SIZE</th>
                <th>SPECIE</th>
                <th>GRADE</th>
                <th>PPU</th>
                <th>92</th>
                <th>104</th>
                <th>116</th>
                <th>8'</th>
                <th>10'</th>
                <th>12'</th>
                <th>14'</th>
                <th>16'</th>
                <th>18'</th>
                <th>20'</th>
                <th>22'</th>
                <th>24'</th>
                <th>26'</th>
                <th>28'</th>
                <th>30'</th>
                <th>32'</th>
                <th>COST</th>
                <th>PO#</th>
                <th>INV</th>
                <th>Action By</th>
              </tr>
            </thead>
            <tbody id="new-purchase-logs-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {
  await requireLogin();
  loadSidebar("new-purchases-logs");
  loadNewPurchaseLogs();
});

function setLogsStatus(message, type = "info") {
  const status = document.getElementById("logs-status");
  if (!status) return;

  status.className = "inline-status show " + type;
  status.textContent = message;

  clearTimeout(status._timer);
  status._timer = setTimeout(() => {
    status.className = "inline-status";
    status.textContent = "";
  }, 2500);
}

function formatTimestamp(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleString();
}

async function loadNewPurchaseLogs() {
  try {
    const { data, error } = await supabaseClient
      .from("new_purchase_logs")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) throw error;

    const tbody = document.getElementById("new-purchase-logs-body");
    tbody.innerHTML = "";

    (data || []).forEach(row => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${formatTimestamp(row.created_at)}</td>
        <td>${row.location ?? ""}</td>
        <td>${row.mill ?? ""}</td>
        <td>${row.size ?? ""}</td>
        <td>${row.specie ?? ""}</td>
        <td>${row.grade ?? ""}</td>
        <td>${row.ppu ?? ""}</td>
        <td>${row.len_92 ?? ""}</td>
        <td>${row.len_104 ?? ""}</td>
        <td>${row.len_116 ?? ""}</td>
        <td>${row.len_8 ?? ""}</td>
        <td>${row.len_10 ?? ""}</td>
        <td>${row.len_12 ?? ""}</td>
        <td>${row.len_14 ?? ""}</td>
        <td>${row.len_16 ?? ""}</td>
        <td>${row.len_18 ?? ""}</td>
        <td>${row.len_20 ?? ""}</td>
        <td>${row.len_22 ?? ""}</td>
        <td>${row.len_24 ?? ""}</td>
        <td>${row.len_26 ?? ""}</td>
        <td>${row.len_28 ?? ""}</td>
        <td>${row.len_30 ?? ""}</td>
        <td>${row.len_32 ?? ""}</td>
        <td>${row.cost ?? ""}</td>
        <td>${row.po_number ?? ""}</td>
        <td>${row.inv ?? ""}</td>
        <td>${row.created_by_name || row.created_by_email || ""}</td>
      `;

      tbody.appendChild(tr);
    });

    setLogsStatus(`Loaded ${(data || []).length} New Purchase log row(s).`, "success");
  } catch (error) {
    console.error("New Purchase Logs load error:", error);
    setLogsStatus("Could not load New Purchases Logs.", "error");
  }
}
</script>
</body>
</html>
