<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Purchases Logs</title>
  <link rel="stylesheet" href="global.css" />
      <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<style>
  .page-row {
    align-items: center;
    margin-bottom: 26px;
  }

  .page-frame > section.card {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-radius: 22px;
    border: 1px solid #dbe4ee;
    box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .page-frame > section.card .card-pad {
    padding: 24px 28px 16px;
  }

  .page-frame > section.card .card-title-row {
    margin-bottom: 0;
  }

  .page-frame > section.card .card-title-row .icon {
    display: none;
  }

  .page-frame > section.card .card-title {
    width: 100%;
    display: block;
    background: linear-gradient(135deg, #156082 0%, #0f4a63 100%);
    color: #ffffff;
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 10px 22px rgba(21, 96, 130, 0.16);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 18px;
    font-weight: 900;
    text-align: left;
    box-sizing: border-box;
  }
  
  

.table-wrap {
  width: calc(100% - 56px);
  max-width: calc(100% - 56px);
  margin: 0 auto 28px;
  padding: 0 !important;
  overflow-x: auto;
  overflow-y: hidden;
  box-sizing: border-box;
  border-radius: 14px;
}

.table {
  width: max-content !important;
  min-width: 100% !important;
  border-collapse: separate !important;
  border-spacing: 0 !important;
  background: #ffffff;
  font-size: 13px;
  overflow: hidden;
  border-radius: 14px;
  table-layout: auto !important;
  border: 1px solid #dbe4ee;
  box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
}

  .table thead tr {
    background: #eef2f5 !important;
  }

  .table th {
    background: #eef2f5 !important;
    color: #475569 !important;
    padding: 12px 14px !important;
    text-align: left !important;
    font-size: 10px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    white-space: nowrap !important;
  }

  .table td {
    padding: 11px 14px !important;
    border: 0 !important;
    border-bottom: 1px solid #e5e7eb !important;
    color: #0f172a !important;
    font-size: 13px !important;
    font-weight: 300 !important;
    background: #ffffff;
    vertical-align: middle;
    white-space: normal;
    line-height: 1.3;
  }

  .table tbody tr:nth-child(even) td {
    background: #f8fafc !important;
  }

  .table tbody tr:hover td {
    background: #f1f5f9 !important;
  }

  /* Column sizing to stop ugly wrapping */
  .table th:nth-child(1), .table td:nth-child(1) { min-width: 125px; }
  .table th:nth-child(2), .table td:nth-child(2) { min-width: 110px; }
  .table th:nth-child(3), .table td:nth-child(3) { min-width: 95px; }
  .table th:nth-child(4), .table td:nth-child(4) { min-width: 95px; }
  .table th:nth-child(5), .table td:nth-child(5) { min-width: 95px; }
  .table th:nth-child(6), .table td:nth-child(6) { min-width: 110px; }
  .table th:nth-child(7), .table td:nth-child(7) { min-width: 110px; }
  .table th:nth-child(8), .table td:nth-child(8),
  .table th:nth-child(9), .table td:nth-child(9),
  .table th:nth-child(10), .table td:nth-child(10),
  .table th:nth-child(11), .table td:nth-child(11),
  .table th:nth-child(12), .table td:nth-child(12),
  .table th:nth-child(13), .table td:nth-child(13),
  .table th:nth-child(14), .table td:nth-child(14),
  .table th:nth-child(15), .table td:nth-child(15),
  .table th:nth-child(16), .table td:nth-child(16),
  .table th:nth-child(17), .table td:nth-child(17),
  .table th:nth-child(18), .table td:nth-child(18),
  .table th:nth-child(19), .table td:nth-child(19),
  .table th:nth-child(20), .table td:nth-child(20),
  .table th:nth-child(21), .table td:nth-child(21),
  .table th:nth-child(22), .table td:nth-child(22),
  .table th:nth-child(23), .table td:nth-child(23) {
    min-width: 70px;
    text-align: center !important;
  }

  .table th:nth-last-child(1), .table td:nth-last-child(1) { min-width: 110px; }
  .table th:nth-last-child(2), .table td:nth-last-child(2) { min-width: 90px; }
  .table th:nth-last-child(3), .table td:nth-last-child(3) { min-width: 90px; }
  .table th:nth-last-child(4), .table td:nth-last-child(4) { min-width: 90px; }

  @media(max-width: 900px) {
    .page-row {
      align-items: flex-start;
      flex-direction: column;
    }

    .page-actions,
    .page-actions .btn {
      width: 100%;
    }

    .page-frame > section.card .card-pad {
      padding: 20px 20px 14px;
    }

    .table-wrap {
      padding: 0 20px 20px;
    }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom: 0;">
          <h1>New Purchases Logs</h1>
          <p>View all submitted New Purchase Orders exactly as logged at confirmation time.</p>
        </div>

        <div class="page-actions">
          <button class="btn btn-secondary" onclick="loadNewPurchaseLogs()">Refresh</button>
        </div>
      </div>

      <section class="card">
        <div class="card-pad" style="padding-bottom: 12px;">
          <div class="card-title-row">
            <div class="icon">🕘</div>
            <div class="card-title">New Purchase Logs Table</div>
          </div>
          <div id="logs-status" class="inline-status"></div>
        </div>

        <div class="table-wrap">
          <table class="table" style="min-width: 2550px;">
            <thead>
              <tr>
                <th>TIMESTAMP</th>
                <th>LOCATION</th>
                <th>MILL</th>
                <th>SIZE</th>
                <th>SPECIE</th>
                <th>GRADE</th>
                <th>PPU</th>
                <th>92</th>
                <th>104</th>
                <th>116</th>
                <th>8'</th>
                <th>10'</th>
                <th>12'</th>
                <th>14'</th>
                <th>16'</th>
                <th>18'</th>
                <th>20'</th>
                <th>22'</th>
                <th>24'</th>
                <th>26'</th>
                <th>28'</th>
                <th>30'</th>
                <th>32'</th>
                <th>COST</th>
                <th>PO#</th>
                <th>INV</th>
                <th>Action By</th>
              </tr>
            </thead>
            <tbody id="new-purchase-logs-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {
  await requireLogin();
  loadSidebar("new-purchases-logs");
  loadNewPurchaseLogs();
});

function setLogsStatus(message, type = "info") {
  const status = document.getElementById("logs-status");
  if (!status) return;

  status.className = "inline-status show " + type;
  status.textContent = message;

  clearTimeout(status._timer);
  status._timer = setTimeout(() => {
    status.className = "inline-status";
    status.textContent = "";
  }, 2500);
}

function formatTimestamp(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleString();
}

async function loadNewPurchaseLogs() {
  try {
    const { data, error } = await supabaseClient
      .from("new_purchase_logs")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) throw error;

    const tbody = document.getElementById("new-purchase-logs-body");
    tbody.innerHTML = "";

    (data || []).forEach(row => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${formatTimestamp(row.created_at)}</td>
        <td>${row.location ?? ""}</td>
        <td>${row.mill ?? ""}</td>
        <td>${row.size ?? ""}</td>
        <td>${row.specie ?? ""}</td>
        <td>${row.grade ?? ""}</td>
        <td>${row.ppu ?? ""}</td>
        <td>${row.len_92 ?? ""}</td>
        <td>${row.len_104 ?? ""}</td>
        <td>${row.len_116 ?? ""}</td>
        <td>${row.len_8 ?? ""}</td>
        <td>${row.len_10 ?? ""}</td>
        <td>${row.len_12 ?? ""}</td>
        <td>${row.len_14 ?? ""}</td>
        <td>${row.len_16 ?? ""}</td>
        <td>${row.len_18 ?? ""}</td>
        <td>${row.len_20 ?? ""}</td>
        <td>${row.len_22 ?? ""}</td>
        <td>${row.len_24 ?? ""}</td>
        <td>${row.len_26 ?? ""}</td>
        <td>${row.len_28 ?? ""}</td>
        <td>${row.len_30 ?? ""}</td>
        <td>${row.len_32 ?? ""}</td>
        <td>${row.cost ?? ""}</td>
        <td>${row.po_number ?? ""}</td>
        <td>${row.inv ?? ""}</td>
        <td>${row.created_by_name || row.created_by_email || ""}</td>
      `;

      tbody.appendChild(tr);
    });

    setLogsStatus(`Loaded ${(data || []).length} New Purchase log row(s).`, "success");
  } catch (error) {
    console.error("New Purchase Logs load error:", error);
    setLogsStatus("Could not load New Purchases Logs.", "error");
  }
}
</script>
</body>
</html>
