<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Active Orders</title>
  <link rel="stylesheet" href="global.css" />
      <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <style>
  .ao-header-row {
    align-items: center;
    margin-bottom: 26px;
  }

  /* ===== Filter Area like Matt's / Quality / Reload ===== */
  .ao-filter-card {
    width: 100%;
    margin: 0 0 28px;
    border-radius: 20px;
    background: #ffffff;
    border: 1px solid #dbe4ee;
    box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
  }

  .ao-filter-card .card-pad {
    padding: 22px 28px;
  }

  .ao-filter-card .card-title-row {
    margin-bottom: 16px;
  }

  .ao-filter-grid {
    display: grid;
    grid-template-columns: 360px;
    justify-content: start;
    align-items: end;
    gap: 18px;
  }

  /* ===== Main Board ===== */
  .ao-board {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-radius: 22px;
    padding: 30px;
    border: 1px solid #dbe4ee;
    box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
    overflow-x: auto;
  }

  .ao-title {
    width: 100%;
    max-width: 1250px;
    margin: 0 auto 18px;
    background: linear-gradient(135deg, #156082 0%, #0f4a63 100%);
    color: #ffffff;
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 10px 22px rgba(21, 96, 130, 0.16);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 18px;
    font-weight: 900;
    text-align: left;
  }

  .ao-table {
    width: 100%;
    min-width: 1100px;
    max-width: 1250px;
    margin: 0 auto 0;
    border-collapse: separate;
    border-spacing: 0;
    background: #ffffff;
    font-size: 13px;
    overflow: hidden;
    border-radius: 14px;
    table-layout: fixed;
    border: 1px solid #dbe4ee;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
  }

  .ao-table th {
    background: #eef2f5 !important;
    color: #475569 !important;
    padding: 12px 14px !important;
    text-align: left !important;
    font-size: 10px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    white-space: nowrap;
  }

  .ao-table td {
    padding: 11px 14px !important;
    border: 0 !important;
    border-bottom: 1px solid #e5e7eb !important;
    color: #0f172a !important;
    font-size: 13px !important;
    font-weight: 300 !important;
    background: transparent;
    text-align: center;
  }

  .ao-table td:first-child,
  .ao-table th:first-child {
    text-align: left !important;
  }

  .ao-empty {
    padding: 26px !important;
    text-align: center !important;
    color: #64748b !important;
    background: #f8fafc !important;
    font-weight: 800 !important;
  }

  .ao-pill {
    background: #eaf4d3;
    color: #156082;
    padding: 6px 10px;
    border-radius: 999px;
    font-weight: 900;
    display: inline-block;
  }

  @media(max-width: 900px) {
    .ao-header-row {
      align-items: flex-start;
      flex-direction: column;
    }

    .page-actions,
    .page-actions .btn {
      width: 100%;
    }

    .ao-filter-grid {
      grid-template-columns: 1fr;
    }

    .ao-board {
      padding: 20px;
    }

    .ao-table {
      min-width: 1000px;
    }
  }
</style>
</head>

<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
<div class="page-row ao-header-row">
  <div class="page-hero" style="margin-bottom:0;">
    <h1>Active Orders</h1>
    <p>View active customer orders grouped by location, SO#, PO#, and size.</p>
  </div>

  <div class="page-actions">
    <button class="btn btn-secondary" onclick="loadActiveOrders()">Refresh</button>
  </div>
</div>

<section class="card ao-filter-card">
  <div class="card-pad">
 

    <div class="ao-filter-grid">
      <div class="form-group">
        <label>Customer</label>
        <select id="customer-select" onchange="renderActiveOrders()">
          <option value="">Select Customer</option>
        </select>
      </div>
    </div>
  </div>
</section>

<section class="ao-board">
  <div class="ao-title">Active Orders</div>

  <div class="table-wrap">
    <table class="ao-table">
      <thead>
        <tr>
          <th>Location</th>
          <th>SO#</th>
          <th>Cust PO#</th>
          <th>Size</th>
          <th>Tally</th>
          <th>Cost</th>
          <th>Sales Price</th>
          <th>MBF</th>
          <th>Sold</th>
          <th>Ship Week</th>
        </tr>
      </thead>
      <tbody id="active-orders-body"></tbody>
    </table>
  </div>
</section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
let inventoryRows = [];

document.addEventListener("DOMContentLoaded", async function () {
  await requireLogin();
  loadSidebar("active-orders");
  await loadActiveOrders();
});

function isBlank(value) {
  return value === null || value === undefined || String(value).trim() === "";
}

function num(value) {
  return Number(String(value || "0").replace(/,/g, "")) || 0;
}

function avg(arr) {
  const clean = arr.map(num).filter(v => !Number.isNaN(v));
  if (!clean.length) return "";
  return clean.reduce((a,b) => a + b, 0) / clean.length;
}

function formatNumber(value, digits = 2) {
  if (value === "" || value === null || value === undefined) return "";
  return Number(value).toLocaleString(undefined, { maximumFractionDigits: digits });
}

function formatDate(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d.getTime())) return value;
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}

async function loadActiveOrders() {
  const { data, error } = await supabaseClient
    .from("inventory")
    .select("*")
    .order("customer", { ascending:true });

  if (error) {
    console.error(error);
    showAppModal({
      type:"error",
      title:"Load Failed",
      message:"Could not load inventory records."
    });
    return;
  }

  inventoryRows = data || [];
  loadCustomerDropdown();
  renderActiveOrders();
}

function loadCustomerDropdown() {
  const select = document.getElementById("customer-select");
  const current = select.value;

  const customers = [...new Set(
    inventoryRows
      .map(r => r.customer)
      .filter(v => !isBlank(v))
      .map(String)
  )].sort();

  select.innerHTML = `<option value="">Select Customer</option>`;

  customers.forEach(customer => {
    const opt = document.createElement("option");
    opt.value = customer;
    opt.textContent = customer;
    select.appendChild(opt);
  });

  if (current && customers.includes(current)) {
    select.value = current;
  }
}

function buildTally(lengths) {
  const counts = {};

  lengths.forEach(length => {
    const len = Number(length);
    if (!len) return;
    counts[len] = (counts[len] || 0) + 1;
  });

  const studLens = [92,104,116];
  const dimLens = [8,10,12,14,16,18,20];

  const studParts = studLens
    .filter(l => counts[l])
    .map(l => `${counts[l]}/${l}s`);

  if (studParts.length) return studParts.join("-");

  return dimLens.map(l => counts[l] || 0).join("-");
}

function getGroupedRows(customer) {
  const filtered = inventoryRows.filter(row =>
    String(row.customer || "") === String(customer || "")
  );

  const group = {};

  filtered.forEach(row => {
    const loc = row.location || "";
    const so = row.so_number || "";
    const po = row.cust_po_number || "";
    const size = row.size || "";

    const key = `${loc}|${so}|${po}|${size}`;

    if (!group[key]) {
      group[key] = {
        loc,
        so,
        po,
        size,
        lengths: [],
        cost: [],
        price: [],
        mbf: [],
        sold: [],
        ship: []
      };
    }

    group[key].lengths.push(row.length_value);
    group[key].cost.push(row.cost);
    group[key].price.push(row.sales_price);
    group[key].mbf.push(row.mbf);
    group[key].sold.push(row.sold);
    group[key].ship.push(row.ship_week);
  });

  const output = Object.values(group).map(g => ({
    location: g.loc,
    so: g.so,
    po: g.po,
    size: g.size,
    tally: buildTally(g.lengths),
    cost: avg(g.cost),
    sales_price: avg(g.price),
    mbf: avg(g.mbf),
    sold: g.sold.find(v => !isBlank(v)) || "",
    ship_week: g.ship.find(v => !isBlank(v)) || ""
  }));

  output.sort((a,b) => {
    if (a.location !== b.location) return String(a.location).localeCompare(String(b.location));
    if (Number(a.so) !== Number(b.so)) return Number(a.so || 0) - Number(b.so || 0);
    return String(a.size).localeCompare(String(b.size));
  });

  return output;
}

function renderActiveOrders() {
  const customer = document.getElementById("customer-select").value;
  const tbody = document.getElementById("active-orders-body");

  tbody.innerHTML = "";

  if (!customer) {
    tbody.innerHTML = `<tr><td colspan="10" class="ao-empty">Select a customer to view active orders.</td></tr>`;
    return;
  }

  const rows = getGroupedRows(customer);

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="10" class="ao-empty">No active orders found for this customer.</td></tr>`;
    return;
  }

  const colors = [
    "#f3f4f5",
    "#E3F2FD",
    "#E8F5E9",
    "#FFF3E0",
    "#F3E5F5",
    "#E0F7FA",
    "#FFFDE7",
    "#FBE9E7"
  ];

  let currentSO = null;
  let colorIndex = -1;

  rows.forEach(row => {
    if (row.so !== currentSO) {
      currentSO = row.so;
      colorIndex++;
    }

    const tr = document.createElement("tr");
    tr.style.background = colors[colorIndex % colors.length];

    tr.innerHTML = `
      <td>${row.location || ""}</td>
      <td><span class="ao-pill">${row.so || ""}</span></td>
      <td>${row.po || ""}</td>
      <td>${row.size || ""}</td>
      <td>${row.tally || ""}</td>
      <td>${formatNumber(row.cost, 2)}</td>
      <td>${formatNumber(row.sales_price, 2)}</td>
      <td>${formatNumber(row.mbf, 2)}</td>
      <td>${formatDate(row.sold)}</td>
      <td>${formatDate(row.ship_week)}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
