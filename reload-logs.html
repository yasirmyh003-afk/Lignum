<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reload Logs</title>
  <link rel="stylesheet" href="global.css" />
      <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<style>
  /* ===== Universal Logs Page UI ===== */

  .page-row {
    align-items: center;
    margin-bottom: 26px;
  }

  .page-frame > section.card {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-radius: 22px;
    border: 1px solid #dbe4ee;
    box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .page-frame > section.card .card-pad {
    padding: 24px 28px 16px;
  }

  .page-frame > section.card .card-title-row {
    margin-bottom: 0;
  }

  .page-frame > section.card .card-title-row .icon {
    display: none;
  }

  .page-frame > section.card .card-title {
    width: 100%;
    display: block;
    background: linear-gradient(135deg, #156082 0%, #0f4a63 100%);
    color: #ffffff;
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 10px 22px rgba(21, 96, 130, 0.16);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 18px;
    font-weight: 900;
    text-align: left;
    box-sizing: border-box;
  }

  .table-wrap {
    width: 100%;
    padding: 0 28px 28px;
    overflow-x: auto;
    box-sizing: border-box;
  }

  .table {
    width: 100% !important;
    max-width: 100%;
    border-collapse: separate !important;
    border-spacing: 0 !important;
    background: #ffffff;
    font-size: 13px;
    overflow: hidden;
    border-radius: 14px;
    table-layout: auto;
    border: 1px solid #dbe4ee;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
  }

  .table thead tr {
    background: #eef2f5 !important;
  }

  .table th {
    background: #eef2f5 !important;
    color: #475569 !important;
    padding: 12px 14px !important;
    text-align: left !important;
    font-size: 10px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    white-space: nowrap !important;
  }

  .table td {
    padding: 11px 14px !important;
    border: 0 !important;
    border-bottom: 1px solid #e5e7eb !important;
    color: #0f172a !important;
    font-size: 13px !important;
    font-weight: 300 !important;
    background: #ffffff;
    vertical-align: middle;
    white-space: nowrap;
  }

  .table tbody tr:nth-child(even) td {
    background: #f8fafc !important;
  }

  .table tbody tr:hover td {
    background: #f1f5f9 !important;
  }

  .table tbody tr:last-child td {
    border-bottom: 0 !important;
  }

  .table a,
  .pdf-link {
    color: #156082 !important;
    font-weight: 900;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .table a:hover,
  .pdf-link:hover {
    color: #0f4a63 !important;
  }

  .empty-row {
    padding: 24px !important;
    text-align: center !important;
    color: #64748b !important;
    background: #f8fafc !important;
    font-weight: 800 !important;
  }

  /* Small/simple logs tables should fill the card instead of leaving awkward blank space */
  .page-frame > section.card:first-of-type .table {
    min-width: 100% !important;
    table-layout: fixed;
  }

  .page-frame > section.card:first-of-type .table th,
  .page-frame > section.card:first-of-type .table td {
    white-space: normal;
  }

  /* Large history tables should stay readable and scroll when needed */
  .page-frame > section.card:not(:first-of-type) .table {
    min-width: max-content;
  }

  .page-frame > section.card:not(:first-of-type) .table th,
  .page-frame > section.card:not(:first-of-type) .table td {
    white-space: nowrap;
  }

  @media(max-width: 900px) {
    .page-row {
      align-items: flex-start;
      flex-direction: column;
    }

    .page-actions,
    .page-actions .btn {
      width: 100%;
    }

    .page-frame > section.card .card-pad {
      padding: 20px 20px 14px;
    }

    .table-wrap {
      padding: 0 20px 20px;
    }

    .page-frame > section.card .card-title {
      font-size: 16px;
      padding: 13px 16px;
    }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom:0;">
          <h1>Reload Logs</h1>
          <p>View generated Reload PDF links.</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="loadReloadLogs()">Refresh</button>
        </div>
      </div>

      <section class="card">
        <div class="card-pad">
          <div class="card-title-row">
            <div class="icon">🔄</div>
            <div class="card-title">Reload PDF Logs</div>
          </div>
        </div>

        <div class="table-wrap">
          <table class="table" style="min-width:700px;">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>PDF URL</th>
				<th>Action By</th>
              </tr>
            </thead>
            <tbody id="reload-logs-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  loadSidebar("reload-logs");
  loadReloadLogs();
});

async function loadReloadLogs() {
  const { data, error } = await supabaseClient
    .from("reload_pdf_logs")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const tbody = document.getElementById("reload-logs-body");
  tbody.innerHTML = "";

  (data || []).forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${new Date(row.created_at).toLocaleString()}</td>
      <td>${row.pdf_url ? `<a href="${row.pdf_url}" target="_blank">Open PDF</a>` : ""}</td>
	  <td>${row.created_by_name || row.created_by_email || ""}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
