<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotation Logs</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪵</text></svg>">

  <style>
    .logs-table {
      width: 100%;
      table-layout: fixed;
    }

    .logs-table th,
    .logs-table td {
      text-align: left;
      white-space: normal;
      word-break: break-word;
    }

    .logs-table th:first-child,
    .logs-table td:first-child {
      width: 260px;
    }

    .logs-table th:last-child,
    .logs-table td:last-child {
      width: auto;
    }

    .pdf-link {
      color: #156082;
      font-weight: 900;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom:0;">
          <h1>Quotation Logs</h1>
          <p>View generated quotation PDF links.</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="loadQuotationLogs()">Refresh</button>
        </div>
      </div>

      <section class="card">
        <div class="card-pad">
          <div class="card-title-row">
            <div class="icon">🧾</div>
            <div class="card-title">Quotation PDF Logs</div>
          </div>
        </div>

        <div class="table-wrap" style="overflow-x: visible;">
          <table class="table logs-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>PDF URL</th>
				<th>Action By</th>
              </tr>
            </thead>
            <tbody id="quotation-logs-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  loadSidebar("quotation-logs");
  loadQuotationLogs();
});

async function loadQuotationLogs() {
  const { data, error } = await supabaseClient
    .from("quotation_logs")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const tbody = document.getElementById("quotation-logs-body");
  tbody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${new Date(row.created_at).toLocaleString()}</td>
      <td><a class="pdf-link" href="${row.pdf_url}" target="_blank">Open PDF</a></td>
	  <td>${row.created_by_name || row.created_by_email || ""}</td>
    `;
    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
