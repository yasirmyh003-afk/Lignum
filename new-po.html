<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Purchase Order</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪵</text></svg>">
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-mount" class="sidebar-mount"></div>

    <main class="page-shell">
      <div class="page-frame">
        <div class="page-hero">
          <h1>New Purchase Order</h1>
          <p>Create new PO entries to flow into global inventory records.</p>
        </div>

        <div class="content-grid">
          <div class="col-12 section-stack">
            <section class="card">
              <div class="card-pad">
                <div class="card-title-row">
                  <div class="icon">📄</div>
                  <div class="card-title">PO Header Details</div>
                </div>

                <div class="form-grid cols-4">
                  <div class="form-group">
                    <label>Location</label>
                    <select id="location">
                      <option value="">Select Location</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label>Mill</label>
                    <select id="mill">
                      <option value="">Select Mill</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label>Size</label>
                    <select id="size">
                      <option value="">Select Size</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label>Specie</label>
                    <select id="specie">
                      <option value="">Select Specie</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label>Grade</label>
                    <select id="grade">
                      <option value="">Select Grade</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label>PPU</label>
                    <div class="input-prefix">
                      <span>$</span>
                      <input id="ppu" type="number" step="0.01" />
                    </div>
                  </div>

                  <div class="form-group">
                    <label>Cost</label>
                    <div class="input-prefix">
                      <span>$</span>
                      <input id="cost" type="number" step="0.01" />
                    </div>
                  </div>

                  <div class="form-group">
                    <label>PO#</label>
                    <input id="po_number" type="text" value="PO-2026-0142" />
                  </div>

                  <div class="form-group">
                    <label>INV</label>
                    <select id="inv">
                      <option value="">Select INV</option>
                    </select>
                  </div>
                </div>
              </div>
            </section>

            <section class="card card-subtle-border-left secondary">
              <div class="card-pad">
                <div class="card-title-row">
                  <div class="icon">🧮</div>
                  <div class="card-title">Length Quantity Entry</div>
                </div>

                <div class="length-grid">
                  <div class="length-item"><label>92</label><input id="len_92" type="number" /></div>
                  <div class="length-item"><label>104</label><input id="len_104" type="number" /></div>
                  <div class="length-item"><label>116</label><input id="len_116" type="number" /></div>
                  <div class="length-item"><label>8'</label><input id="len_8" type="number" /></div>
                  <div class="length-item"><label>10'</label><input id="len_10" type="number" /></div>
                  <div class="length-item"><label>12'</label><input id="len_12" type="number" /></div>
                  <div class="length-item"><label>14'</label><input id="len_14" type="number" /></div>
                  <div class="length-item"><label>16'</label><input id="len_16" type="number" /></div>
                  <div class="length-item"><label>18'</label><input id="len_18" type="number" /></div>
                  <div class="length-item"><label>20'</label><input id="len_20" type="number" /></div>
                  <div class="length-item"><label>22'</label><input id="len_22" type="number" /></div>
                  <div class="length-item"><label>24'</label><input id="len_24" type="number" /></div>
                  <div class="length-item"><label>26'</label><input id="len_26" type="number" /></div>
                  <div class="length-item"><label>28'</label><input id="len_28" type="number" /></div>
                  <div class="length-item"><label>30'</label><input id="len_30" type="number" /></div>
                  <div class="length-item"><label>32'</label><input id="len_32" type="number" /></div>
                </div>
				
				<div class="row-end" style="gap:10px;">
				  <button class="btn btn-secondary" type="button" onclick="fetchPOData()">Fetch Data</button>
				  <button class="btn btn-warning" type="button" onclick="updatePurchaseOrder()">Update Purchase Order</button>
				  <button class="btn btn-primary" type="button" onclick="confirmPurchaseOrder()">Confirm Purchase Order</button>
				</div>
				
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      loadSidebar("new-po");
      await loadDropdownOptions();
    });

    async function loadDropdownOptions() {
      try {
        const { data, error } = await supabaseClient
          .from("dropdown_options")
          .select("*")
          .order("value", { ascending: true });

        if (error) throw error;

        fillSelect("location", data.filter(x => x.category === "location"));
        fillSelect("mill", data.filter(x => x.category === "mill"));
        fillSelect("grade", data.filter(x => x.category === "grade"));
        fillSelect("size", data.filter(x => x.category === "size"));
        fillSelect("specie", data.filter(x => x.category === "specie"));
        fillSelect("inv", data.filter(x => x.category === "inv"));
      } catch (error) {
        console.error("Dropdown load error:", error);
        showAppModal({
          type: "error",
          title: "Dropdown Load Failed",
          message: "Could not load the New PO dropdown values from Supabase."
        });
      }
    }

    function fillSelect(selectId, rows) {
      const select = document.getElementById(selectId);
      if (!select) return;

      const placeholderMap = {
        location: "Select Location",
        mill: "Select Mill",
        grade: "Select Grade",
        size: "Select Size",
        specie: "Select Specie",
        inv: "Select INV"
      };

      select.innerHTML = `<option value="">${placeholderMap[selectId]}</option>`;

      rows.forEach(row => {
        const option = document.createElement("option");
        option.value = row.value;
        option.textContent = row.value;
        select.appendChild(option);
      });
    }

    function resetPurchaseOrderForm() {
      document.getElementById("location").value = "";
      document.getElementById("mill").value = "";
      document.getElementById("size").value = "";
      document.getElementById("specie").value = "";
      document.getElementById("grade").value = "";
      document.getElementById("ppu").value = "";
      document.getElementById("cost").value = "";
      document.getElementById("po_number").value = "";
      document.getElementById("inv").value = "";

      [
        "len_92","len_104","len_116","len_8","len_10","len_12","len_14","len_16",
        "len_18","len_20","len_22","len_24","len_26","len_28","len_30","len_32"
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });
    }

    function parseSize(sizeText) {
      const cleaned = String(sizeText).toLowerCase().replace(/\s/g, "");
      const match = cleaned.match(/^(\d+)x(\d+)$/);
      if (!match) return null;
      return {
        height: Number(match[1]),
        width: Number(match[2])
      };
    }

    function getCalcLength(lengthValue) {
      const n = Number(lengthValue);
      if (n === 96) return 8;
      if (n === 92) return 8;
      if (n === 104) return 9;
      if (n === 116) return 10;
      return n;
    }

    function calculateMBF(size, lengthValue, ppu) {
      const parsed = parseSize(size);
      if (!parsed || !lengthValue || !ppu) return null;
      const calcLength = getCalcLength(lengthValue);
      const mbf = ((parsed.height * parsed.width * calcLength) / 12) * Number(ppu) / 1000;
      return Number(mbf.toFixed(4));
    }

    function getLengthType(lengthValue) {
      const studLengths = [92, 96, 104, 116];
      return studLengths.includes(Number(lengthValue)) ? "Stud" : "Dimension";
    }

    function buildHelper(mill, grade, poNumber, shipped = "") {
      return `${shipped} | ${mill} - ${grade} | ${poNumber}`;
    }

    function getLengths() {
      return [
        { length: "92", quantity: Number(document.getElementById("len_92")?.value || 0) },
        { length: "104", quantity: Number(document.getElementById("len_104")?.value || 0) },
        { length: "116", quantity: Number(document.getElementById("len_116")?.value || 0) },
        { length: "8", quantity: Number(document.getElementById("len_8")?.value || 0) },
        { length: "10", quantity: Number(document.getElementById("len_10")?.value || 0) },
        { length: "12", quantity: Number(document.getElementById("len_12")?.value || 0) },
        { length: "14", quantity: Number(document.getElementById("len_14")?.value || 0) },
        { length: "16", quantity: Number(document.getElementById("len_16")?.value || 0) },
        { length: "18", quantity: Number(document.getElementById("len_18")?.value || 0) },
        { length: "20", quantity: Number(document.getElementById("len_20")?.value || 0) },
        { length: "22", quantity: Number(document.getElementById("len_22")?.value || 0) },
        { length: "24", quantity: Number(document.getElementById("len_24")?.value || 0) },
        { length: "26", quantity: Number(document.getElementById("len_26")?.value || 0) },
        { length: "28", quantity: Number(document.getElementById("len_28")?.value || 0) },
        { length: "30", quantity: Number(document.getElementById("len_30")?.value || 0) },
        { length: "32", quantity: Number(document.getElementById("len_32")?.value || 0) }
      ];
    }

    async function confirmPurchaseOrder() {
  try {
    const location = document.getElementById("location").value;
    const mill = document.getElementById("mill").value;
    const size = document.getElementById("size").value;
    const specie = document.getElementById("specie").value;
    const grade = document.getElementById("grade").value;
    const ppu = Number(document.getElementById("ppu").value || 0);
    const cost = Number(document.getElementById("cost").value || 0);
    const po_number = document.getElementById("po_number").value.trim();
    const inv = document.getElementById("inv").value;
    const auditUser = await getAuditUser();

    if (!location || !mill || !size || !specie || !grade || !po_number || !inv) {
      showAppModal({
        type: "error",
        title: "Missing Fields",
        message: "Please fill all required PO header fields before continuing."
      });
      return;
    }

    const lengths = getLengths().filter(item => item.quantity > 0);

    if (lengths.length === 0) {
      showAppModal({
        type: "error",
        title: "Missing Quantities",
        message: "Please enter at least one length quantity before confirming the purchase order."
      });
      return;
    }

    const { data: poData, error: poError } = await supabaseClient
      .from("purchase_orders")
      .insert([{ location, mill, size, specie, grade, ppu, cost, po_number, inv }])
      .select()
      .single();

    if (poError) throw poError;

    const purchaseOrderId = poData.id;

    const lengthRows = lengths.map(item => ({
      purchase_order_id: purchaseOrderId,
      length_value: item.length,
      quantity: item.quantity
    }));

    const { error: lengthsError } = await supabaseClient
      .from("purchase_order_lengths")
      .insert(lengthRows);

    if (lengthsError) throw lengthsError;

    const inventoryRows = [];

    for (const item of lengths) {
      for (let i = 0; i < item.quantity; i++) {
        const mbf = calculateMBF(size, item.length, ppu);

        inventoryRows.push({
          sku: null,
          car_number: null,
          po_number,
          location,
          mill,
          specie,
          grade,
          ppu,
          size,
          length_value: Number(item.length),
          mbf,
          sales_price: null,
          cust_po_number: null,
          ship_week: null,
          customer: null,
          number_group: null,
          so_number: null,
          cost,
          storage: null,
          interest: null,
          futures: null,
          sold: null,
          invoiced: null,
          received: null,
          shipped: null,
          inv,
          available: true,
          length_type: getLengthType(item.length),
          subtotal: 1,
          helper: buildHelper(mill, grade, po_number, ""),
          note: null
        });
      }
    }

    const { error: inventoryError } = await supabaseClient
      .from("inventory")
      .insert(inventoryRows);

    if (inventoryError) throw inventoryError;

    const qtyMap = {
      "92": 0, "104": 0, "116": 0,
      "8": 0, "10": 0, "12": 0, "14": 0, "16": 0,
      "18": 0, "20": 0, "22": 0, "24": 0, "26": 0,
      "28": 0, "30": 0, "32": 0
    };

    lengths.forEach(item => {
      qtyMap[item.length] = item.quantity;
    });

    const { error: logError } = await supabaseClient
      .from("new_purchase_logs")
      .insert([{
        location,
        mill,
        size,
        specie,
        grade,
        ppu,
        len_92: qtyMap["92"],
        len_104: qtyMap["104"],
        len_116: qtyMap["116"],
        len_8: qtyMap["8"],
        len_10: qtyMap["10"],
        len_12: qtyMap["12"],
        len_14: qtyMap["14"],
        len_16: qtyMap["16"],
        len_18: qtyMap["18"],
        len_20: qtyMap["20"],
        len_22: qtyMap["22"],
        len_24: qtyMap["24"],
        len_26: qtyMap["26"],
        len_28: qtyMap["28"],
        len_30: qtyMap["30"],
        len_32: qtyMap["32"],
        cost,
        po_number,
        inv,
        created_by_name: auditUser.name,
        created_by_email: auditUser.email
      }]);

    if (logError) throw logError;

    showAppModal({
      type: "success",
      title: "Purchase Order Created",
      message: "The purchase order was saved, inventory rows were inserted, and the log row was added successfully."
    });

    resetPurchaseOrderForm();
  } catch (error) {
    console.error("Confirm PO Error:", error);
    showAppModal({
      type: "error",
      title: "Something Went Wrong",
      message: "The purchase order could not be created. Please check the console and verify your Supabase settings."
    });
  }
}
	
	
	async function fetchPOData() {
	const po_number = document.getElementById("po_number").value.trim();

	  if (!po_number) {
		showAppModal({
		  type: "error",
		  title: "Missing PO#",
		  message: "Enter PO number first."
		});
		return;
	  }

	  try {
		const { data, error } = await supabaseClient
		  .from("inventory")
		  .select("*")
		  .eq("po_number", po_number);

		if (error) throw error;

		if (!data || data.length === 0) {
		  showAppModal({
			type: "error",
			title: "Not Found",
			message: "No inventory found for this PO#."
		  });
		  return;
		}

		const first = data[0];

		// Fill header
		document.getElementById("location").value = first.location || "";
		document.getElementById("mill").value = first.mill || "";
		document.getElementById("size").value = first.size || "";
		document.getElementById("specie").value = first.specie || "";
		document.getElementById("grade").value = first.grade || "";
		document.getElementById("ppu").value = first.ppu || "";
		document.getElementById("cost").value = first.cost || "";
		document.getElementById("inv").value = first.inv || "";

		// Reset lengths
		document.querySelectorAll(".length-item input").forEach(i => i.value = "");

		// Count lengths
		const lengthMap = {};

		data.forEach(row => {
		  const len = String(row.length_value);
		  lengthMap[len] = (lengthMap[len] || 0) + 1;
		});

		Object.keys(lengthMap).forEach(len => {
		  const el = document.getElementById(`len_${len}`);
		  if (el) el.value = lengthMap[len];
		});

		showAppModal({
		  type: "success",
		  title: "Data Loaded",
		  message: "PO data fetched successfully."
		});

	  } catch (err) {
		console.error(err);
		showAppModal({
		  type: "error",
		  title: "Fetch Failed",
		  message: "Could not fetch PO data."
		});
	  }
	}
	
	async function updatePurchaseOrder() {
  try {
    const po_number = document.getElementById("po_number").value.trim();
    const auditUser = await getAuditUser();

    if (!po_number) {
      showAppModal({
        type: "error",
        title: "Missing PO#",
        message: "Enter PO number."
      });
      return;
    }

    const location = document.getElementById("location").value;
    const mill = document.getElementById("mill").value;
    const size = document.getElementById("size").value;
    const specie = document.getElementById("specie").value;
    const grade = document.getElementById("grade").value;
    const ppu = Number(document.getElementById("ppu").value || 0);
    const cost = Number(document.getElementById("cost").value || 0);
    const inv = document.getElementById("inv").value;

    if (!location || !mill || !size || !specie || !grade || !po_number || !inv) {
      showAppModal({
        type: "error",
        title: "Missing Fields",
        message: "Please fill all required PO header fields before updating."
      });
      return;
    }

    const { data: existingRows, error } = await supabaseClient
      .from("inventory")
      .select("*")
      .eq("po_number", po_number);

    if (error) throw error;

    if (!existingRows || existingRows.length === 0) {
      showAppModal({
        type: "error",
        title: "Not Found",
        message: "No existing inventory rows were found for this PO#."
      });
      return;
    }

    const currentMap = {};
    existingRows.forEach(row => {
      const len = String(row.length_value);
      currentMap[len] = (currentMap[len] || 0) + 1;
    });

    const newLengths = getLengths();
    const newMap = {};

    newLengths.forEach(item => {
      if (item.quantity > 0) {
        newMap[item.length] = item.quantity;
      }
    });

    if (Object.keys(newMap).length === 0) {
      showAppModal({
        type: "error",
        title: "Missing Quantities",
        message: "Please enter at least one length quantity before updating."
      });
      return;
    }

    for (const len in currentMap) {
      const currentQty = currentMap[len];
      const updatedQty = newMap[len] || 0;

      if (currentQty > updatedQty) {
        const diff = currentQty - updatedQty;

        const rowsToDelete = existingRows
          .filter(row => String(row.length_value) === len)
          .slice(0, diff);

        for (const row of rowsToDelete) {
          const { error: deleteError } = await supabaseClient
            .from("inventory")
            .delete()
            .eq("id", row.id);

          if (deleteError) throw deleteError;
        }
      }
    }

    const insertRows = [];

    for (const len in newMap) {
      const currentQty = currentMap[len] || 0;
      const updatedQty = newMap[len];

      if (updatedQty > currentQty) {
        const diff = updatedQty - currentQty;

        for (let i = 0; i < diff; i++) {
          insertRows.push({
            sku: null,
            car_number: null,
            po_number,
            location,
            mill,
            specie,
            grade,
            ppu,
            size,
            length_value: Number(len),
            mbf: calculateMBF(size, len, ppu),
            sales_price: null,
            cust_po_number: null,
            ship_week: null,
            customer: null,
            number_group: null,
            so_number: null,
            cost,
            storage: null,
            interest: null,
            futures: null,
            sold: null,
            invoiced: null,
            received: null,
            shipped: null,
            inv,
            available: true,
            length_type: getLengthType(len),
            subtotal: 1,
            helper: buildHelper(mill, grade, po_number, ""),
            note: null
          });
        }
      }
    }

    if (insertRows.length > 0) {
      const { error: insertError } = await supabaseClient
        .from("inventory")
        .insert(insertRows);

      if (insertError) throw insertError;
    }

    const { data: finalRows, error: finalFetchError } = await supabaseClient
      .from("inventory")
      .select("*")
      .eq("po_number", po_number);

    if (finalFetchError) throw finalFetchError;

    for (const row of finalRows) {
      const len = String(row.length_value);

      const { error: updateError } = await supabaseClient
        .from("inventory")
        .update({
          location,
          mill,
          size,
          specie,
          grade,
          ppu,
          cost,
          inv,
          mbf: calculateMBF(size, len, ppu),
          length_type: getLengthType(len),
          subtotal: 1,
          helper: buildHelper(mill, grade, po_number, row.shipped || "")
        })
        .eq("id", row.id);

      if (updateError) throw updateError;
    }

    const qtyMap = {
      "92": 0, "104": 0, "116": 0,
      "8": 0, "10": 0, "12": 0, "14": 0, "16": 0,
      "18": 0, "20": 0, "22": 0, "24": 0, "26": 0,
      "28": 0, "30": 0, "32": 0
    };

    Object.keys(newMap).forEach(len => {
      qtyMap[len] = newMap[len];
    });

    const { error: logError } = await supabaseClient
      .from("new_purchase_logs")
      .insert([{
        location,
        mill,
        size,
        specie,
        grade,
        ppu,
        len_92: qtyMap["92"],
        len_104: qtyMap["104"],
        len_116: qtyMap["116"],
        len_8: qtyMap["8"],
        len_10: qtyMap["10"],
        len_12: qtyMap["12"],
        len_14: qtyMap["14"],
        len_16: qtyMap["16"],
        len_18: qtyMap["18"],
        len_20: qtyMap["20"],
        len_22: qtyMap["22"],
        len_24: qtyMap["24"],
        len_26: qtyMap["26"],
        len_28: qtyMap["28"],
        len_30: qtyMap["30"],
        len_32: qtyMap["32"],
        cost,
        po_number,
        inv,
        created_by_name: auditUser.name,
        created_by_email: auditUser.email
      }]);

    if (logError) throw logError;

    showAppModal({
      type: "success",
      title: "PO Updated",
      message: "Inventory rows were updated, MBF was recalculated, and a New PO Logs entry was added."
    });

  } catch (err) {
    console.error("Update PO Error:", err);
    showAppModal({
      type: "error",
      title: "Update Failed",
      message: "Something went wrong while updating the purchase order."
    });
  }
}
	
  </script>
</body>
