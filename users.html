<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users</title>
  <link rel="stylesheet" href="global.css" />
<link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<style>
  /* ===== Users Page Table UI ===== */

  .page-row {
    align-items: center;
    margin-bottom: 26px;
  }

  #add-user-card {
    border-radius: 22px;
    border: 1px solid #dbe4ee;
    box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
  }

  .page-frame > section.card:not(#add-user-card) {
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    border-radius: 22px;
    border: 1px solid #dbe4ee;
    box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    margin-bottom: 24px;
    padding: 28px;
  }

  .page-frame > section.card:not(#add-user-card) .card-pad {
    padding: 0;
    margin-bottom: 18px;
  }

  .page-frame > section.card:not(#add-user-card) .card-title-row {
    margin-bottom: 0;
  }

  .page-frame > section.card:not(#add-user-card) .card-title-row .icon {
    display: none;
  }

  .page-frame > section.card:not(#add-user-card) .card-title {
    width: 100%;
    display: block;
    background: linear-gradient(135deg, #156082 0%, #0f4a63 100%);
    color: #ffffff;
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 10px 22px rgba(21, 96, 130, 0.16);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 18px;
    font-weight: 900;
    text-align: left;
    box-sizing: border-box;
  }

  .page-frame > section.card:not(#add-user-card) .table-wrap {
    width: 100%;
    padding: 0 !important;
    margin: 0;
    overflow-x: auto;
    overflow-y: hidden;
    box-sizing: border-box;
    border-radius: 14px;
  }

  .page-frame > section.card:not(#add-user-card) .table {
    width: 100% !important;
    min-width: 900px !important;
    border-collapse: separate !important;
    border-spacing: 0 !important;
    background: #ffffff;
    font-size: 13px;
    overflow: hidden;
    border-radius: 14px;
    table-layout: auto !important;
    border: 1px solid #dbe4ee;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
  }

  .page-frame > section.card:not(#add-user-card) .table thead tr {
    background: #eef2f5 !important;
  }

  .page-frame > section.card:not(#add-user-card) .table th {
    background: #eef2f5 !important;
    color: #475569 !important;
    padding: 12px 14px !important;
    text-align: left !important;
    font-size: 10px !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    white-space: nowrap !important;
  }

  .page-frame > section.card:not(#add-user-card) .table td {
    padding: 11px 14px !important;
    border: 0 !important;
    border-bottom: 1px solid #e5e7eb !important;
    color: #0f172a !important;
    font-size: 13px !important;
    font-weight: 300 !important;
    background: #ffffff;
    vertical-align: middle;
    white-space: nowrap;
  }

  .page-frame > section.card:not(#add-user-card) .table tbody tr:nth-child(even) td {
    background: #f8fafc !important;
  }

  .page-frame > section.card:not(#add-user-card) .table tbody tr:hover td {
    background: #f1f5f9 !important;
  }

  .page-frame > section.card:not(#add-user-card) .table tbody tr:last-child td {
    border-bottom: 0 !important;
  }

  .page-frame > section.card:not(#add-user-card) .btn-sm {
    padding: 7px 10px;
    font-size: 12px;
    border-radius: 8px;
  }

  .page-frame > section.card:not(#add-user-card) .empty-row {
    padding: 24px !important;
    text-align: center !important;
    color: #64748b !important;
    background: #f8fafc !important;
    font-weight: 800 !important;
  }

  @media(max-width: 900px) {
    .page-row {
      align-items: flex-start;
      flex-direction: column;
    }

    .page-actions,
    .page-actions .btn {
      width: 100%;
    }

    .page-frame > section.card:not(#add-user-card) {
      padding: 20px;
    }

    .page-frame > section.card:not(#add-user-card) .card-title {
      font-size: 16px;
      padding: 13px 16px;
    }
  }
  

  .user-edit-input,
  .user-edit-select {
    width: 100%;
    min-width: 130px;
    border: 1px solid #dbe4ee;
    background: #ffffff;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    font-weight: 700;
    color: #0f172a;
    outline: none;
  }

  .user-edit-input:focus,
  .user-edit-select:focus {
    box-shadow: 0 0 0 2px rgba(21, 96, 130, 0.16);
  }

  .users-actions-cell {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

</style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount" class="sidebar-mount"></div>

  <main class="page-shell">
    <div class="page-frame">
      <div class="page-row">
        <div class="page-hero" style="margin-bottom:0;">
          <h1>Users</h1>
          <p>Add users, manage roles, status, and send password reset emails.</p>
        </div>
        
		
		<div class="page-actions">
			<button id="add-user-toggle-btn" class="btn btn-primary" onclick="toggleAddUserCard()" style="display:none;">Add New User</button>
			<button class="btn btn-secondary" onclick="loadUsers()">Refresh</button>
		</div>

	
      </div>


	  <section id="add-user-card" class="card" style="margin-bottom:24px; display:none;">
        <div class="card-pad">
          <div class="card-title-row">

            <div class="card-title">Add User Login</div>
          </div>

          <div class="form-grid cols-4">
            <div class="form-group">
              <label>Full Name</label>
              <input id="full_name" type="text" placeholder="John Smith" />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input id="email" type="email" placeholder="user@email.com" />
            </div>

            <div class="form-group">
              <label>Temporary Password</label>
              <input id="password" type="password" placeholder="Minimum 6 characters" />
            </div>

            <div class="form-group">
              <label>Role</label>
              <select id="role">
                <option value="Admin">Admin</option>
                <option value="Manager">Manager</option>
                <option value="User" selected>User</option>
              </select>
            </div>

            <div class="form-group">
              <label>Status</label>
              <select id="status">
                <option value="Active" selected>Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>

          <div class="row-end" style="margin-top:18px;">
            <button class="btn btn-primary" onclick="addUser()">Add User Login</button>
          </div>

          <p style="margin-top:14px;color:#64748b;font-size:13px;">
            Note: New users will receive email confirmation if Supabase email confirmation is enabled.
          </p>
        </div>
      </section>

      <section class="card">
        <div class="card-pad" style="padding-bottom:12px;">
          <div class="card-title-row">

            <div class="card-title">Users List</div>
          </div>

          <div id="users-status" class="inline-status"></div>
        </div>

        <div class="table-wrap">
          <table class="table" style="min-width:1100px;">
            <thead>
              <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
let editingUserId = null;

document.addEventListener("DOMContentLoaded", async function () {
  await requireLogin();
  loadSidebar("users");

  const currentUser = await getCurrentAppUser();
  const addUserCard = document.getElementById("add-user-card");
  const addUserToggleBtn = document.getElementById("add-user-toggle-btn");

  const isAdmin = currentUser && currentUser.role === "Admin";

  if (addUserCard) addUserCard.style.display = "none";

  if (isAdmin && addUserToggleBtn) {
    addUserToggleBtn.style.display = "inline-flex";
  }

  loadUsers();
});

function setUsersStatus(message, type = "info") {
  const status = document.getElementById("users-status");
  status.className = "inline-status show " + type;
  status.textContent = message;

  clearTimeout(status._timer);
  status._timer = setTimeout(() => {
    status.className = "inline-status";
    status.textContent = "";
  }, 4000);
}

function safeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function safeJs(value) {
  return String(value || "")
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'")
    .replaceAll('"', "&quot;")
    .replaceAll("\n", " ");
}

function toggleAddUserCard() {
  const addUserCard = document.getElementById("add-user-card");
  const addUserToggleBtn = document.getElementById("add-user-toggle-btn");

  if (!addUserCard) return;

  const isHidden = addUserCard.style.display === "none" || !addUserCard.style.display;

  addUserCard.style.display = isHidden ? "block" : "none";

  if (addUserToggleBtn) {
    addUserToggleBtn.textContent = isHidden ? "Hide Add User" : "Add New User";
  }
}

async function loadUsers() {
  const currentUser = await getCurrentAppUser();
  const isAdmin = currentUser && currentUser.role === "Admin";

  const { data, error } = await supabaseClient
    .from("app_users")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    setUsersStatus("Failed to load users.", "error");
    return;
  }

  const tbody = document.getElementById("users-body");
  tbody.innerHTML = "";

  if (!data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-row">No users found.</td></tr>`;
    return;
  }

  data.forEach(user => {
    const isEditing = editingUserId === user.id;
    const tr = document.createElement("tr");

    if (isEditing) {
      tr.innerHTML = `
        <td>
          <input id="edit-full-name-${user.id}" class="user-edit-input" value="${safeHtml(user.full_name)}" />
        </td>

        <td>
          <input id="edit-email-${user.id}" class="user-edit-input" type="email" value="${safeHtml(user.email)}" />
        </td>

        <td>
          <select id="edit-role-${user.id}" class="user-edit-select">
            <option value="Admin" ${user.role === "Admin" ? "selected" : ""}>Admin</option>
            <option value="Manager" ${user.role === "Manager" ? "selected" : ""}>Manager</option>
            <option value="User" ${user.role === "User" ? "selected" : ""}>User</option>
          </select>
        </td>

        <td>
          <select id="edit-status-${user.id}" class="user-edit-select">
            <option value="Active" ${user.status === "Active" ? "selected" : ""}>Active</option>
            <option value="Inactive" ${user.status === "Inactive" ? "selected" : ""}>Inactive</option>
          </select>
        </td>

        <td>${user.created_at ? new Date(user.created_at).toLocaleString() : ""}</td>

        <td>
          <div class="users-actions-cell">
            <button class="btn btn-primary btn-sm" onclick="saveUserEdit('${user.id}', '${safeJs(user.email)}')">
              Save
            </button>
            <button class="btn btn-secondary btn-sm" onclick="cancelUserEdit()">
              Cancel
            </button>
          </div>
        </td>
      `;
    } else {
      tr.innerHTML = `
        <td>${safeHtml(user.full_name)}</td>
        <td>${safeHtml(user.email)}</td>
        <td>${safeHtml(user.role)}</td>
        <td>${safeHtml(user.status)}</td>
        <td>${user.created_at ? new Date(user.created_at).toLocaleString() : ""}</td>
        <td>
          <div class="users-actions-cell">
            <button class="btn btn-warning btn-sm" onclick="sendPasswordReset('${safeJs(user.email)}')">
              Reset Password
            </button>

            ${
              isAdmin
                ? `
                  <button class="btn btn-secondary btn-sm" onclick="startUserEdit('${user.id}')">
                    Edit
                  </button>
                  <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')">
                    Delete
                  </button>
                `
                : ``
            }
          </div>
        </td>
      `;
    }

    tbody.appendChild(tr);
  });
}

function startUserEdit(userId) {
  editingUserId = userId;
  loadUsers();
}

function cancelUserEdit() {
  editingUserId = null;
  loadUsers();
}

async function saveUserEdit(userId, oldEmail) {
  const fullName = document.getElementById(`edit-full-name-${userId}`).value.trim();
  const email = document.getElementById(`edit-email-${userId}`).value.trim().toLowerCase();
  const role = document.getElementById(`edit-role-${userId}`).value;
  const status = document.getElementById(`edit-status-${userId}`).value;

  if (!fullName || !email || !role || !status) {
    setUsersStatus("Full name, email, role, and status are required.", "error");
    return;
  }

  const normalizedOldEmail = String(oldEmail || "").trim().toLowerCase();
  const emailChanged = normalizedOldEmail !== email;

  const confirmMessage = emailChanged
    ? "Save changes and send password setup/reset email to the new email?"
    : "Save user changes? No email will be sent because the email was not changed.";

  const ok = confirm(confirmMessage);
  if (!ok) return;

  setUsersStatus("Saving user changes...", "info");

  const { data, error } = await supabaseClient.functions.invoke("admin-update-user", {
    body: {
      appUserId: userId,
      oldEmail: normalizedOldEmail,
      fullName,
      email,
      role,
      status
    }
  });

  if (error || data?.error) {
    console.error(error || data?.error);
    setUsersStatus(data?.error || error?.message || "Could not update user.", "error");
    return;
  }

  /*
    Only send email when email changed.
    If only name/status/role changed, no email is sent.
  */
  if (emailChanged) {
    const { error: resetError } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/update-password.html"
    });

    if (resetError) {
      console.error(resetError);
      setUsersStatus("User updated, but password setup/reset email could not be sent.", "error");
      editingUserId = null;
      loadUsers();
      return;
    }

    editingUserId = null;
    setUsersStatus("User updated and password setup/reset email sent to new email.", "success");
    loadUsers();
    return;
  }

  editingUserId = null;

  if (status === "Inactive") {
    setUsersStatus("User updated and deactivated. They cannot login now.", "success");
  } else {
    setUsersStatus("User updated successfully. No email was sent.", "success");
  }

  loadUsers();
}

async function addUser() {
  const fullName = document.getElementById("full_name").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;
  const status = document.getElementById("status").value;

  if (!fullName || !email || !password) {
    setUsersStatus("Full name, email, and password are required.", "error");
    return;
  }

  if (password.length < 6) {
    setUsersStatus("Password must be at least 6 characters.", "error");
    return;
  }

  const { error: authError } = await supabaseClient.auth.signUp({
    email,
    password,
    options: {
      emailRedirectTo: window.location.origin + "/login.html",
      data: {
        full_name: fullName,
        role,
        status
      }
    }
  });

  if (authError) {
    console.error(authError);
    setUsersStatus(authError.message, "error");
    return;
  }

  const { error: profileError } = await supabaseClient
    .from("app_users")
    .insert([{
      full_name: fullName,
      email,
      role,
      status
    }]);

  if (profileError) {
    console.error(profileError);
    setUsersStatus("Login created, but profile insert failed.", "error");
    return;
  }

  document.getElementById("full_name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";
  document.getElementById("role").value = "User";
  document.getElementById("status").value = "Active";

  const addUserCard = document.getElementById("add-user-card");
  const addUserToggleBtn = document.getElementById("add-user-toggle-btn");

  if (addUserCard) addUserCard.style.display = "none";
  if (addUserToggleBtn) addUserToggleBtn.textContent = "Add New User";

  setUsersStatus("User created. Confirmation email will be sent if enabled in Supabase.", "success");
  loadUsers();
}

async function sendPasswordReset(email) {
  if (!email) {
    setUsersStatus("Email not found.", "error");
    return;
  }

  const ok = confirm("Send password reset email to " + email + "?");
  if (!ok) return;

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/update-password.html"
  });

  if (error) {
    console.error(error);
    setUsersStatus(error.message, "error");
    return;
  }

  setUsersStatus("Password reset email sent.", "success");
}

async function deleteUser(id) {
  const ok = confirm("Delete this user profile? This removes app profile only, not Supabase Auth login.");
  if (!ok) return;

  const { error } = await supabaseClient
    .from("app_users")
    .delete()
    .eq("id", id);

  if (error) {
    console.error(error);
    setUsersStatus("Failed to delete user.", "error");
    return;
  }

  setUsersStatus("User profile deleted.", "success");
  loadUsers();
}
</script>
</body>
</html>
