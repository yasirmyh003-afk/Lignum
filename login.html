<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Lignum Operations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="global.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fa;
      padding: 18px;
    }

    .login-card {
      width: 420px;
      max-width: 100%;
      background: white;
      border-radius: 20px;
      padding: 34px;
      box-shadow: 0 20px 50px rgba(15,23,42,.12);
      border: 1px solid #e2e8f0;
    }

    .login-title {
      font-size: 28px;
      font-weight: 900;
      color: #156082;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: #64748b;
      margin-bottom: 28px;
    }

    .login-actions {
      margin-top: 20px;
    }

    .login-actions .btn {
      width: 100%;
      height: 48px;
    }

    .login-status {
      display: none;
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }

    .login-status.show {
      display: block;
    }

    .login-status.error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .login-status.success {
      background: #ecfdf5;
      color: #059669;
      border: 1px solid #bbf7d0;
    }

    .login-status.info {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
    }

    @media(max-width: 520px) {
      .login-card {
        padding: 26px;
      }

      .login-title {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

<div class="login-card">
  <div class="login-title">Lignum Operations</div>
  <div class="login-subtitle">Login to continue</div>

  <div id="login-status" class="login-status"></div>

  <div class="form-group">
    <label>Email</label>
    <input id="email" type="email" placeholder="Enter email" />
  </div>

  <div class="form-group" style="margin-top:14px;">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter password" />
  </div>

  <div class="login-actions">
    <button id="login-btn" class="btn btn-primary" onclick="loginUser()">Login</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
function setLoginStatus(message, type = "info") {
  const status = document.getElementById("login-status");

  if (!status) return;

  status.className = "login-status show " + type;
  status.textContent = message;
}

function clearLoginStatus() {
  const status = document.getElementById("login-status");

  if (!status) return;

  status.className = "login-status";
  status.textContent = "";
}

function showLoginRedirectMessage() {
  const params = new URLSearchParams(window.location.search);

  if (params.get("inactive") === "1") {
    setLoginStatus("Your account is inactive. Please contact an administrator.", "error");
    return;
  }

  if (params.get("deleted") === "1") {
    setLoginStatus("Your account no longer exists. Please contact an administrator.", "error");
    return;
  }

  if (params.get("loggedout") === "1") {
    setLoginStatus("Please login to continue.", "info");
  }
}

async function loginUser() {
  clearLoginStatus();

  const loginBtn = document.getElementById("login-btn");
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    setLoginStatus("Please enter email and password.", "error");
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "Logging in...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
    setLoginStatus(error.message, "error");
    return;
  }

  if (!data.session) {
    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
    setLoginStatus("Login worked, but no session was created. Please confirm this user's email in Supabase Auth.", "error");
    return;
  }

  const loggedInEmail = String(data.user?.email || email).trim().toLowerCase();

  const { data: appUser, error: appUserError } = await supabaseClient
    .from("app_users")
    .select("*")
    .eq("email", loggedInEmail)
    .maybeSingle();

  if (appUserError) {
    console.error(appUserError);

    await supabaseClient.auth.signOut();

    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
    setLoginStatus("Could not verify user access. Please contact an administrator.", "error");
    return;
  }

  if (!appUser) {
    await supabaseClient.auth.signOut();

    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
    setLoginStatus("Your account no longer exists. Please contact an administrator.", "error");
    return;
  }

  if (appUser.status !== "Active") {
    await supabaseClient.auth.signOut();

    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
    setLoginStatus("Your account is inactive. Please contact an administrator.", "error");
    return;
  }

  localStorage.setItem("lignum_access_token", data.session.access_token);
  localStorage.setItem("lignum_refresh_token", data.session.refresh_token);

  window.location.replace("dashboard.html");
}

document.addEventListener("DOMContentLoaded", showLoginRedirectMessage);

document.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    loginUser();
  }
});
</script>

</body>
</html>
