<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Lignum Operations</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪵</text></svg>">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fa;
    }
    .login-card {
      width: 420px;
      background: white;
      border-radius: 20px;
      padding: 34px;
      box-shadow: 0 20px 50px rgba(15,23,42,.12);
      border: 1px solid #e2e8f0;
    }
    .login-title {
      font-size: 28px;
      font-weight: 900;
      color: #156082;
      margin-bottom: 8px;
    }
    .login-subtitle {
      color: #64748b;
      margin-bottom: 28px;
    }
    .login-actions {
      margin-top: 20px;
    }
    .login-actions .btn {
      width: 100%;
      height: 48px;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-title">Lignum Operations</div>
  <div class="login-subtitle">Login to continue</div>

  <div class="form-group">
    <label>Email</label>
    <input id="email" type="email" placeholder="Enter email" />
  </div>

  <div class="form-group" style="margin-top:14px;">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter password" />
  </div>

  <div class="login-actions">
    <button class="btn btn-primary" onclick="loginUser()">Login</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function loginUser() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please enter email and password.");
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  if (!data.session) {
    alert("Login worked, but no session was created. Please confirm this user's email in Supabase Auth.");
    return;
  }

  localStorage.setItem("lignum_access_token", data.session.access_token);
  localStorage.setItem("lignum_refresh_token", data.session.refresh_token);

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
