  <script>
    const selectedRowIds = new Set();
	let allInventoryRows = [];
	let activeFilters = {};
	let currentFilterMenu = null;

    const inventoryColumns = [
      { label: "SKU", field: "sku", type: "text" },
      { label: "CAR#", field: "car_number", type: "text" },
      { label: "PO#", field: "po_number", type: "text" },
      { label: "LOCATION", field: "location", type: "text" },
      { label: "MILL", field: "mill", type: "text" },
      { label: "SPECIE", field: "specie", type: "text" },
      { label: "GRADE", field: "grade", type: "text" },
      { label: "PPU", field: "ppu", type: "number" },
      { label: "SIZE", field: "size", type: "text" },
      { label: "L (')", field: "length_value", type: "number" },
      { label: "MBF", field: "mbf", type: "number" },
      { label: "SALES PRICE", field: "sales_price", type: "number" },
      { label: "CUST PO#", field: "cust_po_number", type: "text" },
      { label: "SHIP WEEK", field: "ship_week", type: "text" },
      { label: "CUSTOMER", field: "customer", type: "text" },
      { label: "#", field: "number_group", type: "number" },
      { label: "SO#", field: "so_number", type: "text" },
      { label: "COST", field: "cost", type: "number" },
      { label: "STORAGE", field: "storage", type: "number" },
      { label: "INTEREST", field: "interest", type: "number" },
      { label: "FUTURES", field: "futures", type: "number" },
      { label: "SOLD", field: "sold", type: "date" },
      { label: "INVOICED", field: "invoiced", type: "date" },
      { label: "RECEIVED", field: "received", type: "date" },
      { label: "SHIPPED", field: "shipped", type: "date" },
      { label: "INV", field: "inv", type: "text" },
      { label: "AVAILABLE", field: "available", type: "boolean" },
      { label: "LENGTH TYPE", field: "length_type", type: "text" },
      { label: "SUBTOTAL", field: "subtotal", type: "number" },
      { label: "HELPER", field: "helper", type: "text" },
      { label: "NOTE", field: "note", type: "text" }
    ];

    document.addEventListener("DOMContentLoaded", function () {
      loadSidebar("inventory");
      loadInventoryRows();
    });

    function setInventoryStatus(message, type = "info") {
      const status = document.getElementById("inventory-status");
      if (!status) return;

      status.className = "inline-status show " + type;
      status.textContent = message;

      clearTimeout(status._timer);
      status._timer = setTimeout(() => {
        status.className = "inline-status";
        status.textContent = "";
      }, 2500);
    }

    function formatDisplayValue(value, type) {
      if (value === null || value === undefined) return "";
      if (type === "boolean") return String(value);
      return value;
    }

    function parseEditedValue(value, type) {
      const cleaned = value.trim();

      if (cleaned === "") return null;

      if (type === "number") {
        const num = Number(cleaned);
        return Number.isNaN(num) ? null : num;
      }

      if (type === "boolean") {
        const lowered = cleaned.toLowerCase();
        if (lowered === "true" || lowered === "yes" || lowered === "1") return true;
        if (lowered === "false" || lowered === "no" || lowered === "0") return false;
        return null;
      }

      return cleaned;
    }

    async function updateInventoryCell(rowId, field, type, cellEl) {
      try {
        const rawValue = cellEl.textContent;
        const parsedValue = parseEditedValue(rawValue, type);

        const payload = {};
        payload[field] = parsedValue;

        const { error } = await supabaseClient
          .from("inventory")
          .update(payload)
          .eq("id", rowId);

        if (error) throw error;

        cellEl.textContent = parsedValue === null ? "" : String(parsedValue);
        setInventoryStatus("Cell updated successfully.", "success");
      } catch (error) {
        console.error("Cell update error:", error);
        setInventoryStatus("Could not update the edited cell.", "error");
      }
    }

    function createEditableCell(row, column) {
      const td = document.createElement("td");
      const div = document.createElement("div");

      div.className = "editable-cell" + (column.field === "sku" ? " mono" : "");
      div.contentEditable = "true";
      div.dataset.id = row.id;
      div.dataset.field = column.field;
      div.dataset.type = column.type;
      div.textContent = formatDisplayValue(row[column.field], column.type);

      div.addEventListener("blur", function () {
        updateInventoryCell(row.id, column.field, column.type, div);
      });

      div.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          div.blur();
        }
      });

      td.appendChild(div);
      return td;
    }

async function loadInventoryRows() {
  const { data, error } = await supabaseClient
    .from("inventory")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Inventory load error:", error);
    setInventoryStatus("Could not load inventory rows.", "error");
    return;
  }

  allInventoryRows = data || [];
  renderInventoryHeader();
  renderInventoryRows();
  renderActiveFilterBar();
  loadSavedFilters();
}


function renderInventoryHeader() {
  const head = document.getElementById("inventory-table-head");
  if (!head) return;

  head.innerHTML = `<th>Select</th>`;

  inventoryColumns.forEach(column => {
    const th = document.createElement("th");
    th.className = "filterable-th";
    th.innerHTML = `
      ${column.label}
      <button class="th-filter-btn" onclick="openColumnFilter(event, '${column.field}')">▾</button>
    `;
    head.appendChild(th);
  });
}


function renderInventoryRows() {
  const tbody = document.getElementById("inventory-table-body");
  if (!tbody) return;

  tbody.innerHTML = "";

  const rows = getFilteredRows();

  rows.forEach(row => {
    const tr = document.createElement("tr");

    const checkboxTd = document.createElement("td");
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "row-check";
    checkbox.checked = selectedRowIds.has(row.id);

    checkbox.addEventListener("change", function () {
      if (checkbox.checked) selectedRowIds.add(row.id);
      else selectedRowIds.delete(row.id);
    });

    checkboxTd.appendChild(checkbox);
    tr.appendChild(checkboxTd);

    inventoryColumns.forEach(column => {
      tr.appendChild(createEditableCell(row, column));
    });

    tbody.appendChild(tr);
  });
}



function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}



    async function getSelectedInventoryRows() {
      const ids = Array.from(selectedRowIds);

      if (ids.length === 0) {
        setInventoryStatus("Please select at least one row first.", "error");
        return [];
      }

      const { data, error } = await supabaseClient
        .from("inventory")
        .select("*")
        .in("id", ids);

      if (error) {
        console.error("Selected rows fetch error:", error);
        setInventoryStatus("Could not fetch selected rows.", "error");
        return [];
      }

      return data || [];
    }

    // ===== TRADE CONFIRMED =====
    // Same Apps Script logic, but only on checked rows
    async function tradeConfirmed() {
  try {
    const selectedRows = await getSelectedInventoryRows();
    if (!selectedRows.length) return;

    const { data: allRows, error: allRowsError } = await supabaseClient
      .from("inventory")
      .select("*");

    if (allRowsError) throw allRowsError;

    let maxNumber = 0;
    const poToNumber = {};

    allRows.forEach(r => {
      const existingNum = Number(r.number_group);
      if (existingNum > maxNumber) maxNumber = existingNum;

      if (r.cust_po_number && existingNum) {
        poToNumber[r.cust_po_number] = existingNum;
      }
    });

    let updatedCount = 0;
    let eligibleCount = 0;

    for (const r of selectedRows) {
      const po = r.cust_po_number;
      const num = r.number_group;
      const so = r.so_number;
      const sold = r.sold;

      if (!po) continue;
      if (so || sold) continue;
      if (num) continue;

      eligibleCount++;

      if (!poToNumber[po]) {
        maxNumber++;
        poToNumber[po] = maxNumber;
      }

      const { error: updateError } = await supabaseClient
        .from("inventory")
        .update({ number_group: poToNumber[po] })
        .eq("id", r.id);

      if (updateError) throw updateError;
      updatedCount++;
    }

    await loadInventoryRows();

    if (eligibleCount === 0) {
      setInventoryStatus(
        `You selected ${selectedRows.length} row(s), but none were eligible. Trade Confirmed requires CUST PO#, no SO#, no SOLD date, and no existing #.`,
        "error"
      );
      return;
    }

    setInventoryStatus(
      `Trade Confirmed applied to ${updatedCount} eligible row(s) out of ${selectedRows.length} selected row(s).`,
      "success"
    );
  } catch (error) {
    console.error("Trade Confirmed Error:", error);
    setInventoryStatus("Trade Confirmed failed.", "error");
  }
}

    // ===== SO# CONFIRMED =====
    // Same Apps Script logic, but only on checked rows
    async function soConfirmed() {
  try {
    const selectedRows = await getSelectedInventoryRows();
    if (!selectedRows.length) return;

    const today = new Date().toISOString().split("T")[0];
    let affected = 0;

    for (const r of selectedRows) {
      const salesPrice = r.sales_price;
      const po = r.cust_po_number;
      const so = r.so_number;
      const sold = r.sold;
      const num = r.number_group;

      if (so && !sold) {
        const { error: updateError } = await supabaseClient
          .from("inventory")
          .update({
            sold: today,
            number_group: null
          })
          .eq("id", r.id);

        if (updateError) throw updateError;
        affected++;
        continue;
      }

      if (!salesPrice && !po && !so && !sold && num) {
        const { error: cleanupError } = await supabaseClient
          .from("inventory")
          .update({
            number_group: null
          })
          .eq("id", r.id);

        if (cleanupError) throw cleanupError;
        affected++;
      }
    }

    await loadInventoryRows();

    if (affected === 0) {
      setInventoryStatus(
        `You selected ${selectedRows.length} row(s), but none matched the SO# Confirmed rules.`,
        "error"
      );
      return;
    }

    setInventoryStatus(
      `SO# Confirmed applied to ${affected} row(s) out of ${selectedRows.length} selected row(s).`,
      "success"
    );
  } catch (error) {
    console.error("SO Confirmed Error:", error);
    setInventoryStatus("SO# Confirmed failed.", "error");
  }
}

    // ===== SALES ACTION =====
    async function submitSalesAction() {
      try {
        const so = document.getElementById("sales_so").value.trim();
        const invoiced = document.getElementById("sales_invoiced").value || null;
        const salesPriceRaw = document.getElementById("sales_price").value;
        const salesPrice = salesPriceRaw === "" ? null : Number(salesPriceRaw);

        if (!so) {
          setInventoryStatus("SO# is required for Sales Action.", "error");
          return;
        }

        const { data, error } = await supabaseClient
          .from("inventory")
          .select("*")
          .eq("so_number", so);

        if (error) throw error;
        if (!data || data.length === 0) {
          setInventoryStatus("No inventory rows were found for that SO#.", "error");
          return;
        }

        for (const row of data) {
          const payload = {};
          if (invoiced !== null) payload.invoiced = invoiced;
          if (salesPrice !== null) payload.sales_price = salesPrice;

          const { error: updateError } = await supabaseClient
            .from("inventory")
            .update(payload)
            .eq("id", row.id);

          if (updateError) throw updateError;
        }

        await loadInventoryRows();
        closeDrawer("sopoDrawer", "sopoOverlay");
        setInventoryStatus(`Sales Action applied to ${data.length} row(s).`, "success");
      } catch (error) {
        console.error("Sales Action Error:", error);
        setInventoryStatus("Sales Action failed.", "error");
      }
    }

    // ===== SHIPPING ACTION =====
    async function submitShippingAction() {
      try {
        const po = document.getElementById("ship_po").value.trim();
        const shipped = document.getElementById("ship_shipped").value || null;
        const car = document.getElementById("ship_car").value.trim() || null;
        const received = document.getElementById("ship_received").value || null;
        const profitRaw = document.getElementById("ship_profit").value;
        const profit = profitRaw === "" ? null : Number(profitRaw);

        if (!po) {
          setInventoryStatus("PO# is required for Shipping Action.", "error");
          return;
        }

        const { data, error } = await supabaseClient
          .from("inventory")
          .select("*")
          .eq("po_number", po);

        if (error) throw error;
        if (!data || data.length === 0) {
          setInventoryStatus("No inventory rows were found for that PO#.", "error");
          return;
        }

        for (const row of data) {
          const payload = {};
          if (shipped !== null) payload.shipped = shipped;
          if (car !== null) payload.car_number = car;
          if (received !== null) payload.received = received;
          if (profit !== null) payload.futures = profit;

          const { error: updateError } = await supabaseClient
            .from("inventory")
            .update(payload)
            .eq("id", row.id);

          if (updateError) throw updateError;
        }

        await loadInventoryRows();
        closeDrawer("sopoDrawer", "sopoOverlay");
        setInventoryStatus(`Shipping Action applied to ${data.length} row(s).`, "success");
      } catch (error) {
        console.error("Shipping Action Error:", error);
        setInventoryStatus("Shipping Action failed.", "error");
      }
    }
	
	
	
	async function loadSavedFilters() {
  const { data, error } = await supabaseClient
    .from("inventory_saved_filters")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Saved filters load error:", error);
    return;
  }

  const list = document.getElementById("saved-filter-list");
  if (!list) return;

  list.innerHTML = "";

  if (!data || data.length === 0) {
    list.innerHTML = `<div class="empty-note">No saved filters yet.</div>`;
    return;
  }

  data.forEach(filter => {
    const item = document.createElement("div");
    item.className = "saved-filter-item";
    item.innerHTML = `
      <div>
        <strong>${filter.name}</strong>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary btn-sm" onclick='applySavedFilter(${JSON.stringify(filter.filters)})'>Apply</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSavedFilter('${filter.id}')">Delete</button>
      </div>
    `;
    list.appendChild(item);
  });
}

async function saveCurrentFilter() {
  const name = document.getElementById("saved_filter_name").value.trim();

  if (!name) {
    setInventoryStatus("Please enter a filter name.", "error");
    return;
  }

  if (Object.keys(activeFilters).length === 0) {
    setInventoryStatus("Please apply at least one column filter first.", "error");
    return;
  }

  const { error } = await supabaseClient
    .from("inventory_saved_filters")
    .insert([{ name, filters: activeFilters }]);

  if (error) {
    console.error("Save filter error:", error);
    setInventoryStatus("Could not save filter.", "error");
    return;
  }

  document.getElementById("saved_filter_name").value = "";
  await loadSavedFilters();
  setInventoryStatus("Filter saved.", "success");
}

function applySavedFilter(filters) {
  activeFilters = filters || {};
  renderInventoryRows();
  renderActiveFilterBar();
  closeDrawer("filterDrawer", "filterOverlay");
  setInventoryStatus("Saved filter applied.", "success");
}

async function deleteSavedFilter(id) {
  const { error } = await supabaseClient
    .from("inventory_saved_filters")
    .delete()
    .eq("id", id);

  if (error) {
    console.error("Delete saved filter error:", error);
    setInventoryStatus("Could not delete saved filter.", "error");
    return;
  }

  await loadSavedFilters();
  setInventoryStatus("Saved filter deleted.", "success");
}

document.addEventListener("click", function(e) {
  if (currentFilterMenu && !currentFilterMenu.contains(e.target) && !e.target.classList.contains("th-filter-btn")) {
    currentFilterMenu.remove();
    currentFilterMenu = null;
  }
});








function getFilteredRows() {
  return allInventoryRows.filter(row => {
    return Object.keys(activeFilters).every(field => {
      const selectedValues = activeFilters[field];

      // IMPORTANT: if filter exists but has 0 selected values, show NO rows
      if (Array.isArray(selectedValues) && selectedValues.length === 0) {
        return false;
      }

      if (!selectedValues) return true;

      const value = row[field] === null || row[field] === undefined ? "" : String(row[field]);
      return selectedValues.includes(value);
    });
  });
}

function openColumnFilter(event, field) {
  event.stopPropagation();

  if (currentFilterMenu) {
    currentFilterMenu.remove();
    currentFilterMenu = null;
  }

  const values = [...new Set(
    allInventoryRows.map(row => row[field] === null || row[field] === undefined ? "" : String(row[field]))
  )].sort();

  const selected = field in activeFilters ? activeFilters[field] : [...values];

  const menu = document.createElement("div");
  menu.className = "column-filter-menu";

  menu.innerHTML = `
    <div class="column-filter-actions">
      <button type="button" onclick="selectAllFilterValues('${field}')">Select All</button>
      <button type="button" onclick="clearColumnFilter('${field}')">Clear</button>
    </div>
    <div id="filter-values-${field}"></div>
    <div class="row-end" style="margin-top:12px;">
      <button class="btn btn-primary btn-sm" type="button" onclick="applyColumnFilter('${field}')">OK</button>
    </div>
  `;

  document.body.appendChild(menu);
  currentFilterMenu = menu;

  const wrap = document.getElementById(`filter-values-${field}`);

  values.forEach(value => {
    const label = document.createElement("label");
    label.className = "filter-value-row";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = `filter-check-${field}`;
    checkbox.value = value;
    checkbox.checked = selected.includes(value);

    const span = document.createElement("span");
    span.className = "filter-value-text";
    span.textContent = value || "(Blank)";

    label.appendChild(checkbox);
    label.appendChild(span);
    wrap.appendChild(label);
  });

  positionFilterMenu(event.target, menu);
}

function positionFilterMenu(button, menu) {
  const rect = button.getBoundingClientRect();
  const menuWidth = 300;
  const menuHeight = Math.min(420, menu.scrollHeight || 420);
  const padding = 12;

  let left = rect.left;
  let top = rect.bottom + 8;

  if (left + menuWidth > window.innerWidth - padding) {
    left = window.innerWidth - menuWidth - padding;
  }

  if (left < padding) {
    left = padding;
  }

  if (top + menuHeight > window.innerHeight - padding) {
    top = rect.top - menuHeight - 8;
  }

  if (top < padding) {
    top = padding;
  }

  menu.style.left = `${left}px`;
  menu.style.top = `${top}px`;
}

function selectAllFilterValues(field) {
  document.querySelectorAll(`.filter-check-${field}`).forEach(cb => cb.checked = true);
}

function clearColumnFilter(field) {
  document.querySelectorAll(`.filter-check-${field}`).forEach(cb => cb.checked = false);
}

function applyColumnFilter(field) {
  const checked = Array.from(document.querySelectorAll(`.filter-check-${field}:checked`))
    .map(cb => cb.value);

  const allValues = [...new Set(
    allInventoryRows.map(row => row[field] === null || row[field] === undefined ? "" : String(row[field]))
  )];

  // If all selected = no active filter
  if (checked.length === allValues.length) {
    delete activeFilters[field];
  } else {
    // If 0 selected, keep [] so it shows no rows
    activeFilters[field] = checked;
  }

  if (currentFilterMenu) {
    currentFilterMenu.remove();
    currentFilterMenu = null;
  }

  renderInventoryRows();
  renderActiveFilterBar();
}

function renderActiveFilterBar() {
  const bar = document.getElementById("active-filter-bar");
  if (!bar) return;

  bar.innerHTML = "";

  Object.keys(activeFilters).forEach(field => {
    const col = inventoryColumns.find(c => c.field === field);
    const selectedCount = activeFilters[field]?.length ?? 0;

    const pill = document.createElement("div");
    pill.className = "filter-pill";
    pill.innerHTML = `
      ${col?.label || field}: ${selectedCount} selected
      <button onclick="removeFilter('${field}')">x</button>
    `;
    bar.appendChild(pill);
  });
}

function removeFilter(field) {
  delete activeFilters[field];
  renderInventoryRows();
  renderActiveFilterBar();
}

document.addEventListener("click", function(e) {
  if (
    currentFilterMenu &&
    !currentFilterMenu.contains(e.target) &&
    !e.target.classList.contains("th-filter-btn")
  ) {
    currentFilterMenu.remove();
    currentFilterMenu = null;
  }
});
  </script>
</body>
